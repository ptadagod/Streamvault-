<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamVault</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --nav-h:64px;
  --gold:#E8C84A;
  --glass:rgba(255,255,255,0.08);
  --glass-border:rgba(255,255,255,0.12);
  --glass-hover:rgba(255,255,255,0.14);
}
html,body{height:100%;background:#08080e;color:#fff;font-family:'DM Sans',sans-serif;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;background:rgba(8,8,14,0.45);pointer-events:none}
/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.2);border-radius:2px}

/* ── NAV ── */
nav{position:fixed;top:16px;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 40px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:#fff;cursor:pointer;user-select:none}
.logo span{color:var(--gold)}
.nav-pill{display:flex;align-items:center;gap:2px;background:rgba(255,255,255,0.07);backdrop-filter:blur(32px) saturate(180%);-webkit-backdrop-filter:blur(32px) saturate(180%);border:1px solid rgba(255,255,255,0.14);border-radius:50px;padding:6px 8px;box-shadow:0 4px 24px rgba(0,0,0,0.25),inset 0 1px 0 rgba(255,255,255,0.1)}
.nav-item{display:flex;align-items:center;gap:0px;padding:12px 28px;border-radius:50px;font-size:16px;font-weight:400;cursor:pointer;transition:all .35s cubic-bezier(.16,1,.3,1);color:rgba(255,255,255,0.55);white-space:nowrap;user-select:none;letter-spacing:0.2px;overflow:hidden}
.nav-item .nav-icon{width:17px;height:17px;flex-shrink:0;max-width:0;opacity:0;overflow:hidden;transition:max-width .35s cubic-bezier(.16,1,.3,1),opacity .25s,margin-right .35s cubic-bezier(.16,1,.3,1);margin-right:0}
.nav-item:hover{background:rgba(255,255,255,0.09);color:rgba(255,255,255,0.9)}
.nav-item.active{background:#fff;color:#000;font-weight:600;box-shadow:0 2px 12px rgba(0,0,0,0.3);padding:12px 30px}
.nav-item.active .nav-icon{max-width:17px;opacity:1;margin-right:8px}
.nav-search-btn{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;color:rgba(255,255,255,0.6);flex-shrink:0}
.nav-search-btn:hover{background:rgba(255,255,255,0.09);color:rgba(255,255,255,0.95)}
.nav-search-btn svg{width:16px;height:16px}



/* ── SEARCH OVERLAY ── */
.search-overlay{position:fixed;inset:0;z-index:200;pointer-events:none;opacity:0;transition:opacity .3s}
.search-overlay.open{pointer-events:all;opacity:1}
.search-backdrop{position:absolute;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.search-box{position:absolute;top:20px;right:20px;left:20px;max-width:600px;margin:0 auto;transform:translateX(40px);opacity:0;transition:transform .35s cubic-bezier(.16,1,.3,1),opacity .35s}
.search-overlay.open .search-box{transform:translateX(0);opacity:1}
.search-input-wrap{display:flex;align-items:center;gap:12px;background:rgba(20,20,28,0.95);border:1px solid rgba(255,255,255,0.15);border-radius:16px;padding:14px 20px}
.search-input-wrap svg{width:18px;height:18px;color:rgba(255,255,255,0.4);flex-shrink:0}
.search-input{flex:1;background:none;border:none;outline:none;color:#fff;font-size:17px;font-family:'DM Sans',sans-serif}
.search-input::placeholder{color:rgba(255,255,255,0.3)}
.search-close{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.08);border:none;color:rgba(255,255,255,0.6);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:all .2s}
.search-close:hover{background:rgba(255,255,255,0.15);color:#fff}
.search-results{margin-top:12px;background:rgba(15,15,22,0.98);border:1px solid rgba(255,255,255,0.1);border-radius:16px;overflow:hidden;max-height:65vh;overflow-y:auto;display:none}
.search-results.show{display:block}
.search-result-item{display:flex;align-items:center;gap:14px;padding:12px 16px;cursor:pointer;transition:background .15s;border-bottom:1px solid rgba(255,255,255,0.05)}
.search-result-item:last-child{border-bottom:none}
.search-result-item:hover{background:rgba(255,255,255,0.06)}
.search-result-poster{width:44px;height:64px;border-radius:8px;object-fit:cover;background:#1a1a24;flex-shrink:0}
.search-result-info{flex:1;min-width:0}
.search-result-title{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.search-result-meta{font-size:12px;color:rgba(255,255,255,0.45);margin-top:3px}
.search-result-type{font-size:11px;padding:2px 8px;border-radius:20px;background:rgba(232,200,74,0.15);color:var(--gold);font-weight:500}

/* ── GLOBAL BG ── */
.global-bg{position:fixed;inset:-80px;z-index:0;background-size:cover;background-position:center top;filter:blur(80px) saturate(140%);opacity:0.9;transition:background-image 1.2s ease;will-change:background-image;pointer-events:none}
.global-bg::after{content:'';position:absolute;inset:0;background:rgba(8,8,14,0.25)}
/* ── HERO ── */
.hero{position:relative;height:100vh;min-height:600px;}
.hero-bg{position:absolute;inset:-60px;background-size:cover;background-position:center;transition:background-image .8s,opacity .8s;will-change:background-image;-webkit-mask-image:linear-gradient(to bottom,black 0%,black 30%,rgba(0,0,0,0.9) 50%,rgba(0,0,0,0.5) 75%,transparent 100%);mask-image:linear-gradient(to bottom,black 0%,black 30%,rgba(0,0,0,0.9) 50%,rgba(0,0,0,0.5) 75%,transparent 100%)}
.hero-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(to right,rgba(8,8,14,0.75) 0%,rgba(8,8,14,0.4) 35%,rgba(8,8,14,0.05) 60%,transparent 100%),linear-gradient(to bottom,rgba(8,8,14,0.4) 0%,transparent 20%);pointer-events:none}
.hero-content{position:relative;z-index:2;height:100%;display:flex;align-items:flex-end;padding:0 70px 120px}
.hero-info{max-width:820px}
.hero-logo-img{max-width:720px;max-height:320px;object-fit:contain;margin-bottom:28px;filter:drop-shadow(0 4px 20px rgba(0,0,0,0.8))}
.hero-logo-fallback{font-family:'Bebas Neue',sans-serif;font-size:190px;letter-spacing:2px;margin-bottom:20px;line-height:0.95;text-shadow:0 4px 40px rgba(0,0,0,0.9)}
.hero-meta{display:flex;align-items:center;gap:14px;margin-bottom:22px}
.hero-year,.hero-rating,.hero-genre{font-size:19px;color:rgba(255,255,255,0.7)}
.hero-dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,0.4)}
.hero-rating{color:var(--gold);font-weight:600}
.hero-desc{font-size:21px;line-height:1.7;color:rgba(255,255,255,0.78);margin-bottom:40px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.hero-actions{display:flex;align-items:center;gap:16px}
.btn-play{display:flex;align-items:center;gap:12px;background:#ffffff !important;color:#000 !important;border:none;padding:18px 42px;border-radius:50px;font-size:19px;font-weight:600;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;position:relative;z-index:10;box-shadow:0 2px 20px rgba(0,0,0,0.3)}
.btn-play:hover{background:rgba(255,255,255,0.85);transform:scale(1.02)}
.btn-play svg{width:22px;height:22px}
/* Combined +/i pill */
.btn-icon-pill{display:flex;align-items:center;border-radius:50px;border:1.5px solid rgba(255,255,255,0.35);background:rgba(255,255,255,0.18);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);transition:border-color .2s,background .2s;color:#fff}
.btn-icon-pill:hover{border-color:rgba(255,255,255,0.7);background:rgba(255,255,255,0.26)}
.btn-icon-half{display:flex;align-items:center;justify-content:center;width:76px;height:62px;background:none;border:none;outline:none;cursor:pointer;color:#fff;flex-shrink:0;transition:transform .2s cubic-bezier(.16,1,.3,1);-webkit-appearance:none;appearance:none;font-family:inherit}
.btn-icon-half:hover{transform:scale(1.25)}
.btn-icon-divider{width:1.5px;height:26px;background:rgba(255,255,255,0.4);border-radius:1px;flex-shrink:0;pointer-events:none}
.btn-icon-half svg{width:26px;height:26px;pointer-events:none;display:block;stroke:#fff;stroke-width:2}
.hero-indicators{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:2}
/* Trailer */
.hero-trailer-wrap{position:absolute;inset:0;z-index:1;pointer-events:none;overflow:hidden;transition:opacity .6s ease;-webkit-mask-image:linear-gradient(to bottom,black 0%,black 30%,rgba(0,0,0,0.9) 50%,rgba(0,0,0,0.5) 75%,transparent 100%);mask-image:linear-gradient(to bottom,black 0%,black 30%,rgba(0,0,0,0.9) 50%,rgba(0,0,0,0.5) 75%,transparent 100%)}
.hero-trailer-wrap::after{content:'';position:absolute;inset:0;z-index:3;background:linear-gradient(to right,rgba(8,8,14,0.75) 0%,rgba(8,8,14,0.4) 35%,rgba(8,8,14,0.05) 60%,transparent 100%),linear-gradient(to bottom,rgba(8,8,14,0.4) 0%,transparent 20%);pointer-events:none}
.hero-trailer-wrap iframe{position:absolute;top:50%;left:50%;width:200vh;height:112.5vw;min-width:120%;min-height:120%;transform:translate(-50%,-50%);pointer-events:none}
.hero-mute-btn{position:absolute;bottom:36px;right:40px;z-index:4;width:42px;height:42px;border-radius:50%;background:rgba(20,20,28,0.6);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1.5px solid rgba(255,255,255,0.3);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.hero-mute-btn:hover{background:rgba(255,255,255,0.18);border-color:rgba(255,255,255,0.6)}
.hero-mute-btn svg{width:18px;height:18px}
.hero-dot-ind{width:24px;height:3px;border-radius:2px;background:rgba(255,255,255,0.25);cursor:pointer;transition:all .3s}
.hero-dot-ind.active{background:#fff;width:36px}

/* ── PLAYER MODAL ── */
.player-modal{position:fixed;inset:0;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;gap:0}
.player-modal.open{opacity:1;pointer-events:all}
.player-backdrop{position:absolute;inset:0;background:rgba(0,0,0,0.94);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);cursor:pointer}
.player-container{position:relative;z-index:1;width:90vw;max-width:1280px;transform:scale(0.95);transition:transform .35s cubic-bezier(.16,1,.3,1)}
.player-modal.open .player-container{transform:scale(1)}
.player-topbar{display:flex;align-items:center;justify-content:space-between;padding:0 0 12px}
.player-title{font-size:15px;font-weight:500;color:rgba(255,255,255,0.75);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:70%}
.player-close{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.18);color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;flex-shrink:0}
.player-close:hover{background:rgba(255,255,255,0.22)}
.player-servers{display:flex;align-items:center;gap:8px;padding:0 0 10px;flex-wrap:wrap}
.player-wrap{position:relative;width:100%;aspect-ratio:16/9;border-radius:14px;overflow:hidden;background:#000;box-shadow:0 30px 80px rgba(0,0,0,0.9)}
.player-wrap iframe{width:100%;height:100%;border:none;display:block}

/* ── ROWS ── */
.rows-section{position:relative;z-index:2;margin-top:-120px;padding:120px 0 60px}
.row-block{margin-bottom:48px;overflow:visible;position:relative}
.row-block::before,.row-block::after{display:none}
.row-track-wrap{position:relative;padding:0 40px;-webkit-mask-image:linear-gradient(to right,transparent 0%,black 8%,black 92%,transparent 100%);mask-image:linear-gradient(to right,transparent 0%,black 8%,black 92%,transparent 100%)}
.row-track-wrap{position:relative;padding:0 40px}
.row-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;padding:0 40px}
.row-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1.5px;color:rgba(255,255,255,0.95)}
.row-title .highlight{color:var(--gold)}
.row-see-all{font-size:13px;color:rgba(255,255,255,0.4);cursor:pointer;transition:color .2s}
.row-see-all:hover{color:#fff}
.row-track{display:flex;gap:12px;overflow-x:auto;padding:8px 4px 16px;scrollbar-width:none}
.row-track::-webkit-scrollbar{display:none}
.card{flex-shrink:0;cursor:pointer;position:relative;border-radius:10px;transition:transform .25s}
.card:hover{transform:scale(1.06);z-index:10}
.card img{width:100%;height:100%;object-fit:cover;display:block;background:#1a1a24;border-radius:10px}
.card-sm{width:200px;height:300px}
.card-md{width:340px;height:191px}
.card-lg{width:240px;height:360px}
.card-rank{position:absolute;bottom:-8px;left:-4px;font-family:'Bebas Neue',sans-serif;font-size:80px;color:rgba(255,255,255,0.12);-webkit-text-stroke:2px rgba(255,255,255,0.2);line-height:1;pointer-events:none;user-select:none}
.card-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.95) 0%,rgba(0,0,0,0.6) 45%,rgba(0,0,0,0.2) 100%);opacity:0;transition:opacity .25s;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.card-play{width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,0.95);display:flex;align-items:center;justify-content:center;transform:scale(0.8);transition:transform .25s cubic-bezier(.16,1,.3,1)}
.card-play svg{width:18px;height:18px;color:#000;margin-left:3px}
.card-hover-title{font-size:13px;font-weight:600;color:#fff;text-align:center;padding:0 10px;transform:translateY(6px);transition:transform .25s cubic-bezier(.16,1,.3,1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.card-meta{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:500;transform:translateY(6px);transition:transform .25s cubic-bezier(.16,1,.3,1) .04s}
.card-meta-rating{color:var(--gold)}
.card-meta-dot{width:2px;height:2px;border-radius:50%;background:rgba(255,255,255,0.4)}
.card-meta-year{color:rgba(255,255,255,0.8)}
.card:hover .card-overlay{opacity:1}
.card:hover .card-play{transform:scale(1)}
.card:hover .card-hover-title{transform:translateY(0)}
.card:hover .card-meta{transform:translateY(0)}
.card:hover .card-overlay{opacity:1}
.card-label{position:absolute;bottom:10px;left:10px;right:10px;font-size:12px;font-weight:500;color:#fff;opacity:0;transition:opacity .2s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card:hover .card-label{opacity:1}
.network-badge{position:absolute;top:8px;right:8px;font-size:10px;font-weight:600;padding:3px 8px;border-radius:4px;letter-spacing:0.5px}
.badge-netflix{background:#E50914;color:#fff}
.badge-disney{background:#113CCF;color:#fff}
.badge-hbo{background:#5A189A;color:#fff}
.badge-apple{background:#555;color:#fff}
.badge-amazon{background:#00A8E0;color:#fff}

/* ── DETAIL PAGE ── */
.detail-page{display:none;position:fixed;inset:0;z-index:150;overflow-y:auto;background:#08080e;scroll-behavior:smooth}
.detail-page.open{display:block}
.detail-hero{position:relative;height:85vh;min-height:560px;overflow:hidden}
.detail-bg{position:absolute;inset:-60px;background-size:cover;background-position:center top;transition:background-image .6s, opacity .8s}
.detail-bg::after{content:'';position:absolute;inset:0;background:
  linear-gradient(to right,rgba(8,8,14,0.92) 0%,rgba(8,8,14,0.6) 45%,rgba(8,8,14,0.1) 75%,transparent 100%),
  linear-gradient(to top,rgba(8,8,14,1) 0%,rgba(8,8,14,0.7) 25%,transparent 60%),
  linear-gradient(to bottom,rgba(8,8,14,0.5) 0%,transparent 20%)}
/* Detail trailer */
.detail-trailer-wrap{position:absolute;inset:0;z-index:1;pointer-events:none;overflow:hidden;transition:opacity .6s ease;-webkit-mask-image:linear-gradient(to bottom,black 0%,black 30%,rgba(0,0,0,0.9) 50%,rgba(0,0,0,0.5) 75%,transparent 100%);mask-image:linear-gradient(to bottom,black 0%,black 30%,rgba(0,0,0,0.9) 50%,rgba(0,0,0,0.5) 75%,transparent 100%)}
.detail-trailer-wrap::after{content:'';position:absolute;inset:0;z-index:3;background:linear-gradient(to right,rgba(8,8,14,0.75) 0%,rgba(8,8,14,0.4) 35%,rgba(8,8,14,0.05) 60%,transparent 100%),linear-gradient(to bottom,rgba(8,8,14,0.4) 0%,transparent 20%);pointer-events:none}
.detail-trailer-wrap iframe{position:absolute;top:50%;left:50%;width:200vh;height:112.5vw;min-width:120%;min-height:120%;transform:translate(-50%,-50%);pointer-events:none}
.detail-back{position:absolute;top:24px;left:28px;z-index:3;width:42px;height:42px;border-radius:50%;background:rgba(0,0,0,0.5);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
.detail-back:hover{background:rgba(255,255,255,0.15)}
.detail-back svg{width:18px;height:18px}
.detail-hero-content{position:absolute;inset:0;z-index:2;display:flex;align-items:flex-end;padding:0 48px 56px;gap:40px}
.detail-left{flex:1;max-width:580px}
.detail-logo{max-width:280px;max-height:120px;object-fit:contain;margin-bottom:16px;filter:drop-shadow(0 4px 20px rgba(0,0,0,0.8))}
.detail-logo-text{font-family:'Bebas Neue',sans-serif;font-size:56px;letter-spacing:2px;margin-bottom:14px;line-height:1;text-shadow:0 4px 30px rgba(0,0,0,0.8)}
.detail-badges{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
.pill-badge{padding:5px 14px;border-radius:50px;font-size:12px;font-weight:500;border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.8);background:rgba(255,255,255,0.06)}
.pill-badge.gold{border-color:rgba(232,200,74,0.4);color:var(--gold);background:rgba(232,200,74,0.08)}
.detail-desc{font-size:15px;line-height:1.75;color:rgba(255,255,255,0.72);margin-bottom:28px;max-width:520px}
.detail-actions{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.btn-play-detail{display:flex;align-items:center;gap:10px;background:#fff;color:#000;border:none;padding:15px 34px;border-radius:50px;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.btn-play-detail:hover{background:rgba(255,255,255,0.88);transform:scale(1.02)}
.btn-play-detail svg{width:17px;height:17px}
.btn-outline{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.1);color:#fff;border:1.5px solid rgba(255,255,255,0.25);padding:14px 22px;border-radius:50px;font-size:15px;font-weight:500;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;backdrop-filter:blur(10px)}
.btn-outline:hover{background:rgba(255,255,255,0.18);border-color:rgba(255,255,255,0.5)}
.btn-outline svg{width:17px;height:17px}
/* Frosted glass info panel */
.detail-info-panel{flex-shrink:0;width:260px;background:rgba(255,255,255,0.07);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:24px;display:flex;flex-direction:column;gap:18px;align-self:flex-end;margin-bottom:4px}
.info-row{display:flex;flex-direction:column;gap:4px}
.info-label{font-size:10px;color:rgba(255,255,255,0.38);text-transform:uppercase;letter-spacing:0.8px}
.info-value{font-size:14px;font-weight:500;color:rgba(255,255,255,0.9);line-height:1.4}
.info-divider{height:1px;background:rgba(255,255,255,0.08)}
/* Below hero sections */
.detail-below{padding:0 48px 80px;background:#08080e;margin-top:-2px}
/* Actors */
.section-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1.5px;color:rgba(255,255,255,0.9);margin-bottom:20px;margin-top:48px}
.actors-row{display:flex;gap:16px;overflow-x:auto;padding-bottom:12px;scrollbar-width:none}
.actors-row::-webkit-scrollbar{display:none}
.actor-card{flex-shrink:0;width:100px;cursor:pointer}
.actor-img{width:100px;height:100px;border-radius:50%;object-fit:cover;background:#1a1a24;margin-bottom:8px;border:2px solid rgba(255,255,255,0.08)}

const API_KEY = 'e7e658fd82cc0dd5ffd5cb4949f45b2c';
const IMG = 'https://image.tmdb.org/t/p/';
const myList = JSON.parse(localStorage.getItem('myList')||'[]');
let heroItems = [], heroIndex = 0, heroTimer;
let currentDetail = null;
const heroBlockedKeys = new Set(); // tracks YouTube keys that returned Error 150/153

/* ── YOUTUBE POSTMESSAGE LISTENER ── */
window.addEventListener('message', e => {
  try {
    const data = typeof e.data === 'string' ? JSON.parse(e.data) : e.data;
    const iframe = document.getElementById('heroTrailerIframe');
    if(!iframe) return;

    // Error event: embedding blocked
    if(data?.event === 'onError'){
      const code = data?.info;
      if(code === 150 || code === 153 || code === 101){
        const key = iframe.dataset.currentKey;
        const nextIdx = parseInt(iframe.dataset.tryIndex||'0') + 1;
        if(key) heroBlockedKeys.add(key);
        tryLoadTrailerGlobal(nextIdx);
      }
    }

    // State change: 0 = ended → advance to next hero item
    if(data?.event === 'onStateChange' && data?.info === 0){
      const itemIdx = parseInt(iframe.dataset.heroIndex||'0');
      // Only advance if this event is for the currently showing hero item
      if(itemIdx === heroIndex){
        clearTimeout(heroTimer);
        // Fade trailer out before advancing
        const trailerWrap = document.getElementById('heroTrailerWrap');
        trailerWrap.style.opacity = '0';
        heroTimer = setTimeout(advanceHero, 800);
      }
    }
  } catch(_){}
});

// Global reference so the postMessage handler can retry on error
function tryLoadTrailerGlobal(index){
  const trailerWrap = document.getElementById('heroTrailerWrap');
  const trailerIframe = document.getElementById('heroTrailerIframe');
  const muteBtn = document.getElementById('heroMuteBtn');
  if(!window._heroCandidates || !window._heroCandidates.length){
    trailerIframe.src=''; trailerWrap.style.display='none'; muteBtn.style.display='none';
    clearTimeout(heroTimer); heroTimer = setTimeout(advanceHero, 10000);
    return;
  }
  const avail = window._heroCandidates.filter(v=>!heroBlockedKeys.has(v.key));
  if(!avail.length || index >= avail.length){
    trailerIframe.src=''; trailerWrap.style.display='none'; muteBtn.style.display='none';
    clearTimeout(heroTimer); heroTimer = setTimeout(advanceHero, 10000);
    return;
  }
  const v = avail[index];
  const mute = heroMuted ? 1 : 0;
  trailerWrap.style.opacity = '0';
  trailerWrap.style.display = 'block';
  // No loop — onStateChange 0 fires when it ends
  trailerIframe.src = `https://www.youtube-nocookie.com/embed/${v.key}?autoplay=1&mute=${mute}&controls=0&rel=0&modestbranding=0&iv_load_policy=3&playsinline=1&enablejsapi=1&disablekb=1&fs=0`;
  trailerIframe.dataset.currentKey = v.key;
  trailerIframe.dataset.tryIndex = String(index);
  trailerIframe.dataset.heroIndex = String(heroIndex);
  fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${v.key}&format=json`)
    .then(r => {
      if(r.ok){
        requestAnimationFrame(()=>{ trailerWrap.style.opacity='1'; });
        muteBtn.style.display='flex'; updateMuteIcon();
        clearTimeout(heroTimer); heroTimer = setTimeout(advanceHero, 180000);
      } else {
        heroBlockedKeys.add(v.key);
        trailerWrap.style.display='none';
        tryLoadTrailerGlobal(index+1);
      }
    })
    .catch(() => {
      requestAnimationFrame(()=>{ trailerWrap.style.opacity='1'; });
      muteBtn.style.display='flex'; updateMuteIcon();
      clearTimeout(heroTimer); heroTimer = setTimeout(advanceHero, 180000);
    });
}

let heroMuted = true;

async function loadHeroItem(i){
  const item = heroItems[i];
  const type = item._type;
  const detail = await api(`/${type}/${item.id}`,`append_to_response=images,videos`);
  const backdrop = detail.backdrop_path ? `${IMG}original${detail.backdrop_path}` : '';
  const heroBg = document.getElementById('heroBg');
  if(backdrop){
    heroBg.style.backgroundImage = `url(${backdrop})`;
    document.getElementById('globalBg').style.backgroundImage = `url(${backdrop})`;
  }

  const logo = detail.images?.logos?.find(l=>l.iso_639_1==='en' && l.file_path);
  const logoEl = document.getElementById('heroLogoImg');
  const titleEl = document.getElementById('heroTitle');
  if(logo){
    logoEl.src = `${IMG}w300${logo.file_path}`;
    logoEl.style.display='block';
    titleEl.style.display='none';
  } else {
    logoEl.style.display='none';
    titleEl.style.display='block';
    titleEl.textContent = detail.title||detail.name||'';
  }

  const genres = (detail.genres||[]).slice(0,2).map(g=>g.name).join(' · ');
  const year = (detail.release_date||detail.first_air_date||'').split('-')[0];
  const rating = detail.vote_average ? detail.vote_average.toFixed(1) : '';
  document.getElementById('heroRating').textContent = rating ? `★ ${rating}` : '';
  document.getElementById('heroYear').textContent = year;
  document.getElementById('heroGenre').textContent = genres;
  document.getElementById('heroDesc').textContent = detail.overview||'';
  document.querySelectorAll('.hero-dot-ind').forEach((d,idx)=>d.classList.toggle('active',idx===i));

  // Trailer — show backdrop first, fade trailer in after delay, advance on end
  const trailerWrap = document.getElementById('heroTrailerWrap');
  const trailerIframe = document.getElementById('heroTrailerIframe');
  const muteBtn = document.getElementById('heroMuteBtn');
  const videos = detail.videos?.results || [];

  // Clear any pending timers from previous item
  clearTimeout(heroTimer);
  clearTimeout(window._trailerDelay);
  trailerIframe.src = '';
  trailerWrap.style.opacity = '0';
  trailerWrap.style.display = 'none';
  muteBtn.style.display = 'none';

  window._heroCandidates = [
    ...videos.filter(v=>v.site==='YouTube' && v.type==='Trailer'),
    ...videos.filter(v=>v.site==='YouTube' && v.type==='Teaser'),
    ...videos.filter(v=>v.site==='YouTube' && v.type!=='Trailer' && v.type!=='Teaser'),
  ];

  // Fallback: if no trailer loads, advance after 12s
  function setFallbackTimer(ms){ heroTimer = setTimeout(advanceHero, ms); }

  function tryLoadTrailer(index){
    const avail = window._heroCandidates.filter(v=>!heroBlockedKeys.has(v.key));
    if(!avail.length || index >= avail.length){
      // No trailer — show backdrop only, advance after 10s
      setFallbackTimer(10000);
      return;
    }
    const v = avail[index];
    const mute = heroMuted ? 1 : 0;
    // No loop — we want to know when it ends so we can advance
    trailerIframe.src = `https://www.youtube-nocookie.com/embed/${v.key}?autoplay=1&mute=${mute}&controls=0&rel=0&modestbranding=0&iv_load_policy=3&playsinline=1&enablejsapi=1&disablekb=1&fs=0`;
    trailerIframe.dataset.currentKey = v.key;
    trailerIframe.dataset.tryIndex = String(index);
    trailerIframe.dataset.heroIndex = String(i);

    fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${v.key}&format=json`)
      .then(r => {
        if(r.ok){
          trailerWrap.style.display = 'block';
          // Small rAF delay so display:block has painted before opacity transition
          requestAnimationFrame(()=>{ trailerWrap.style.opacity = '1'; });
          muteBtn.style.display = 'flex';
          updateMuteIcon();
          // Fallback: advance after 3min max in case postMessage never fires
          setFallbackTimer(180000);
        } else {
          heroBlockedKeys.add(v.key);
          tryLoadTrailer(index + 1);
        }
      })
      .catch(() => {
        trailerWrap.style.display = 'block';
        requestAnimationFrame(()=>{ trailerWrap.style.opacity = '1'; });
        muteBtn.style.display = 'flex';
        updateMuteIcon();
        setFallbackTimer(180000);
      });
  }

  // Show backdrop image for 5 seconds, then fade in trailer
  window._trailerDelay = setTimeout(()=>{
    if(window._heroCandidates.length) tryLoadTrailer(0);
    else setFallbackTimer(10000);
  }, 5000);

  // Fallback if no trailer at all — advance after 15s total
  setFallbackTimer(15000);

  tryLoadTrailer(0);

  document.getElementById('heroPlayBtn').onclick = ()=>openDetail(item.id, type);
  document.getElementById('heroAddBtn').onclick = ()=>toggleList(detail);
  document.getElementById('heroInfoBtn').onclick = ()=>openDetail(item.id, type);
}

function updateMuteIcon(){
  const muteBtn = document.getElementById('heroMuteBtn');
  muteBtn.title = heroMuted ? 'Unmute' : 'Mute';
  muteBtn.innerHTML = heroMuted
    ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>`
    : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>`;
}

document.getElementById('heroMuteBtn').onclick = ()=>{
  heroMuted = !heroMuted;
  // Reload iframe with new mute state
  const iframe = document.getElementById('heroTrailerIframe');
  const currentSrc = iframe.src;
  // Preserve youtube-nocookie domain when toggling mute
  iframe.src = currentSrc.replace(/mute=\d/, `mute=${heroMuted?1:0}`);
  updateMuteIcon();
};

function buildCard(item, size='card-sm', rank=null){
  const type = item.media_type || item._type || (item.title?'movie':'tv');
  const poster = item.poster_path ? `${IMG}w342${item.poster_path}` : '';
  const bsrc = item.backdrop_path ? `${IMG}w500${item.backdrop_path}` : poster;
  const title = item.title||item.name||'';
  const year = (item.release_date||item.first_air_date||'').split('-')[0];
  const rating = item.vote_average ? item.vote_average.toFixed(1) : '';
  const d=document.createElement('div');
  d.className=`card ${size}`;
  d.innerHTML=`
    ${rank!=null?`<div class="card-rank">${rank}</div>`:''}
    <img src="${size==='card-md'?bsrc:poster}" alt="${title}" loading="lazy">
    <div class="card-overlay">
      <div class="card-play"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>
      <div class="card-hover-title">${title}</div>
      <div class="card-meta">
        ${rating?`<span class="card-meta-rating">★ ${rating}</span>`:''}
        ${rating&&year?`<div class="card-meta-dot"></div>`:''}
        ${year?`<span class="card-meta-year">${year}</span>`:''}
      </div>
    </div>`;
  d.onclick=()=>openDetail(item.id, type);
  return d;
}

function buildRow(title, items, size='card-sm', numbered=false){
  const sec=document.createElement('div');
  sec.className='row-block';
  sec.innerHTML=`<div class="row-header"><div class="row-title">${title}</div><div class="row-see-all">See All</div></div>`;
  const wrap=document.createElement('div');
  wrap.className='row-track-wrap';
  const track=document.createElement('div');
  track.className='row-track';
  items.forEach((item,i)=>{
    const card=buildCard(item,size,numbered?i+1:null);
    track.appendChild(card);
  });
  wrap.appendChild(track);
  sec.appendChild(wrap);
  return sec;
}

async function openDetail(id, type){
  const page = document.getElementById('detailPage');
  page.classList.add('open');
  document.body.style.overflow='hidden';
  page.scrollTop=0;

  // Reset
  document.getElementById('detailTitle').textContent='';
  document.getElementById('detailBg').style.backgroundImage='';
  document.getElementById('detailLogoImg').style.display='none';
  document.getElementById('detailBadges').innerHTML='';
  document.getElementById('detailDesc').textContent='';
  document.getElementById('detailActions').innerHTML='<div class="spinner" style="margin:0;width:28px;height:28px"></div>';
  document.getElementById('detailInfoPanel').innerHTML='';
  document.getElementById('detailBelow').innerHTML='<div class="spinner"></div>';

  const [detail, similar] = await Promise.all([
    api(`/${type}/${id}`, `append_to_response=images,credits,videos${type==='tv'?',seasons':''}`),
    api(`/${type}/${id}/similar`)
  ]);
  currentDetail = {...detail, _type: type};

  // Backdrop
  const backdrop = detail.backdrop_path ? `${IMG}original${detail.backdrop_path}` : '';
  if(backdrop){
    document.getElementById('detailBg').style.backgroundImage=`url(${backdrop})`;
    document.getElementById('globalBg').style.backgroundImage=`url(${backdrop})`;
  }

  // Trailer
  const detailTrailerWrap = document.getElementById('detailTrailerWrap');
  const detailTrailerIframe = document.getElementById('detailTrailerIframe');
  const detailMuteBtn = document.getElementById('detailMuteBtn');
  detailTrailerIframe.src = '';
  detailTrailerWrap.style.display = 'none';
  detailTrailerWrap.style.opacity = '0';
  detailMuteBtn.style.display = 'none';
  window._detailMuted = true;
  document.getElementById('detailBg').style.opacity = '1';

  const trailerVideos = (detail.videos?.results || []).filter(v => v.site === 'YouTube' && (v.type === 'Trailer' || v.type === 'Teaser'));
  if(trailerVideos.length){
    const v = trailerVideos[0];
    setTimeout(()=>{
      detailTrailerWrap.style.display = 'block';
      detailTrailerIframe.src = `https://www.youtube-nocookie.com/embed/${v.key}?autoplay=1&mute=1&controls=0&rel=0&modestbranding=1&iv_load_policy=3&playsinline=1&enablejsapi=1&disablekb=1&fs=0`;
      fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${v.key}&format=json`)
        .then(r=>{ if(r.ok){ requestAnimationFrame(()=>{ detailTrailerWrap.style.opacity='1'; document.getElementById('detailBg').style.opacity='0'; }); detailMuteBtn.style.display='flex'; } })
        .catch(()=>{ requestAnimationFrame(()=>{ detailTrailerWrap.style.opacity='1'; document.getElementById('detailBg').style.opacity='0'; }); detailMuteBtn.style.display='flex'; });
    }, 1500);
  }

  // Logo / Title
  const logo = detail.images?.logos?.find(l=>l.iso_639_1==='en' && l.file_path);
  const logoEl = document.getElementById('detailLogoImg');
  const titleEl = document.getElementById('detailTitle');
  if(logo){
    logoEl.src=`${IMG}w300${logo.file_path}`;
    logoEl.style.display='block';
    titleEl.style.display='none';
  } else {
    logoEl.style.display='none';
    titleEl.style.display='block';
    titleEl.textContent=detail.title||detail.name||'';
  }

  // Badges
  const year=(detail.release_date||detail.first_air_date||'').split('-')[0];
  const rating=detail.vote_average?.toFixed(1)||'';
  const genres=(detail.genres||[]).slice(0,3).map(g=>`<span class="pill-badge">${g.name}</span>`).join('');
  document.getElementById('detailBadges').innerHTML=
    (rating?`<span class="pill-badge gold">★ ${rating}</span>`:'')+
    (year?`<span class="pill-badge">${year}</span>`:'')+
    `<span class="pill-badge">${type==='movie'?'Movie':'TV Series'}</span>`+genres;

  // Description
  document.getElementById('detailDesc').textContent=detail.overview||'';

  // Actions
  const inList=myList.some(x=>x.id===detail.id);
  document.getElementById('detailActions').innerHTML=`
    <button class="btn-play-detail" onclick="playVidking(currentDetail.id,currentDetail._type,currentDetail.title||currentDetail.name)">
      <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>Play
    </button>
    <button class="btn-outline" id="detailAddBtn" onclick="toggleList(currentDetail)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
      ${inList?'In My List':'My List'}
    </button>`;

  // Frosted glass info panel
  const stats=[];

    if(detail.release_date) stats.push(['Release Date', detail.release_date]);
    if(detail.runtime) stats.push(['Runtime', `${Math.floor(detail.runtime/60)}h ${detail.runtime%60}m`]);
    if(detail.budget>0) stats.push(['Budget', '$'+Number(detail.budget).toLocaleString()]);
    if(detail.revenue>0) stats.push(['Box Office', '$'+Number(detail.revenue).toLocaleString()]);
  } else {
    if(detail.first_air_date) stats.push(['First Aired', detail.first_air_date]);
    if(detail.number_of_seasons) stats.push(['Seasons', detail.number_of_seasons]);
    if(detail.number_of_episodes) stats.push(['Episodes', detail.number_of_episodes]);
    if(detail.status) stats.push(['Status', detail.status]);
  }
  if(detail.original_language) stats.push(['Language', detail.original_language.toUpperCase()]);
  const director = (detail.credits?.crew||[]).find(c=>c.job==='Director');
  if(director) stats.push(['Director', director.name]);
  const network = detail.networks?.[0]?.name || detail.production_companies?.[0]?.name;

        <div class="actor-name">${a.name}</div>
        <div class="actor-char">${a.character||''}</div>
      </div>`).join('')}
    </div>`;
  }

  // Episodes (TV)
  if(type==='tv'){
    const seasons=(detail.seasons||[]).filter(s=>s.season_number>0);
    if(seasons.length){
      belowHtml += `<div class="section-title">Episodes</div>
      <div class="seasons-section">

    belowHtml += `<div class="section-title">More Like This</div>
    <div class="similar-grid">${simItems.map(item=>`
      <div class="sim-card" onclick="openDetail(${item.id},'${type}')">
        <img src="${IMG}w342${item.poster_path}" alt="${item.title||item.name||''}" loading="lazy">
        <div class="sim-card-overlay"></div>
        <div class="sim-card-title">${item.title||item.name||''}</div>
      </div>`).join('')}
    </div>`;
  }

  document.getElementById('detailBelow').innerHTML = belowHtml;

  // Load first season episodes
  if(type==='tv'){
    const seasons=(detail.seasons||[]).filter(s=>s.season_number>0);
    if(seasons.length) loadSeason(detail.id, seasons[0].season_number);
  }
}

    : '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>';
}

document.getElementById('detailBack').onclick=()=>{
  document.getElementById('detailPage').classList.remove('open');
  document.body.style.overflow='';
  // Stop trailer
  document.getElementById('detailTrailerIframe').src='';
  document.getElementById('detailTrailerWrap').style.display='none';
  document.getElementById('detailMuteBtn').style.display='none';
  document.getElementById('detailBg').style.opacity='1';
  const heroItem = heroItems[heroIndex];
  if(heroItem && document.getElementById('heroBg').style.backgroundImage){
    document.getElementById('globalBg').style.backgroundImage = document.getElementById('heroBg').style.backgroundImage;
  }
};

/* ── SEARCH ── */
let searchTimeout;
document.getElementById('searchBtn').onclick=()=>{
  document.getElementById('searchOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('searchInput').focus(),350);
};
document.getElementById('searchClose').onclick=closeSearch;
document.getElementById('searchBackdrop').onclick=closeSearch;
function closeSearch(){
  document.getElementById('searchOverlay').classList.remove('open');
  document.getElementById('searchInput').value='';
  document.getElementById('searchResults').classList.remove('show');
  document.getElementById('searchResults').innerHTML='';
}

document.getElementById('searchInput').addEventListener('input',e=>{
  clearTimeout(searchTimeout);
  const q=e.target.value.trim();
  if(!q){document.getElementById('searchResults').classList.remove('show');return;}
  searchTimeout=setTimeout(()=>doSearch(q),350);
});

async function doSearch(q){
  const res=document.getElementById('searchResults');
  res.innerHTML='<div style="padding:20px;text-align:center;color:rgba(255,255,255,0.3);font-size:13px">Searching...</div>';
  res.classList.add('show');
  const data=await api('/search/multi',`query=${encodeURIComponent(q)}&include_adult=false`);
  const items=(data.results||[]).filter(x=>x.media_type!=='person' && (x.poster_path||x.backdrop_path)).slice(0,10);
  if(!items.length){
    res.innerHTML='<div style="padding:20px;text-align:center;color:rgba(255,255,255,0.3);font-size:13px">No results found</div>';
    return;
  }
  res.innerHTML=items.map(item=>`
    <div class="search-result-item" onclick="closeSearch();openDetail(${item.id},'${item.media_type}')">
      <img class="search-result-poster" src="${item.poster_path?IMG+'w92'+item.poster_path:''}" alt="" onerror="this.style.background='#1a1a24'">
      <div class="search-result-info">
        <div class="search-result-title">${item.title||item.name||''}</div>
        <div class="search-result-meta">${(item.release_date||item.first_air_date||'').split('-')[0]} · ★ ${item.vote_average?.toFixed(1)||'N/A'}</div>
      </div>
      <div class="search-result-type">${item.media_type==='movie'?'Movie':'Series'}</div>
    </div>`).join('');
}

/* ── MY LIST ── */
function toggleList(item){
  const idx=myList.findIndex(x=>x.id===item.id);
  if(idx>-1){myList.splice(idx,1);showToast('Removed from My List');}
  else{myList.push({id:item.id,_type:item._type||item.media_type||(item.title?'movie':'tv'),poster_path:item.poster_path,title:item.title||item.name});showToast('Added to My List');}
  localStorage.setItem('myList',JSON.stringify(myList));
  renderMyList();
  const btn=document.getElementById('detailAddBtn');
  if(btn) btn.textContent=myList.some(x=>x.id===item.id)?'In My List':'Add to List';
}

function renderMyList(){
  const grid=document.getElementById('mylistGrid');
  if(!myList.length){grid.innerHTML='<div class="mylist-empty">Your list is empty.<br>Add movies and shows to watch later.</div>';return;}
  grid.innerHTML='';
  myList.forEach(item=>{
    const d=document.createElement('div');
    d.className='card card-sm';
    d.style.width='100%';
    const src=item.poster_path?`${IMG}w342${item.poster_path}`:'';
    d.innerHTML=`<img src="${src}" alt="${item.title||''}" loading="lazy"><div class="card-overlay"></div><div class="card-label">${item.title||''}</div>`;
    d.onclick=()=>openDetail(item.id, item._type);
    grid.appendChild(d);
  });
}

/* ── NAV PAGES ── */
document.querySelectorAll('.nav-item').forEach(btn=>{
  btn.onclick=()=>{
    const pg=btn.dataset.page;
    document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById(`page-${pg}`).classList.add('active');
    if(pg==='movies' && !document.getElementById('movieRows').children.length) loadMovieRows();
    if(pg==='shows' && !document.getElementById('showRows').children.length) loadShowRows();
    if(pg==='mylist') renderMyList();
  };
});

/* ── TOAST ── */
let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2500);
}

/* ── INIT ── */
initHero();
loadHomeRows();

/* ── VIDKING PLAYER ── */
let currentPlayerState = null;

function playVidking(id, type, title, season, episode){
  currentPlayerState = {id, type, title, season, episode};
  let src;
  if(type==='movie'){
    src=`https://www.vidking.net/embed/movie/${id}?autoPlay=true`;
  } else {
    const s=season||1, e=episode||1;
    src=`https://www.vidking.net/embed/tv/${id}/${s}/${e}?autoPlay=true&nextEpisode=true&episodeSelector=true`;
  }
  document.getElementById('playerTitle').textContent=title||'';
  document.getElementById('playerServers').innerHTML='';
  document.getElementById('playerIframe').src=src;
  document.getElementById('playerModal').classList.add('open');
  document.body.style.overflow='hidden';
}

function closePlayer(){
  document.getElementById('playerModal').classList.remove('open');
  document.getElementById('playerIframe').src='';
  document.body.style.overflow='';
}

document.addEventListener('keydown',e=>{if(e.key==='Escape') closePlayer();});
</script>

<script>
(function(){
  const STORAGE_KEY = 'sv_brave_dismissed';
  if(localStorage.getItem(STORAGE_KEY)) return;

  // Detect Brave — navigator.brave.isBrave() is the official Brave API
  function isBrave(){
    if(navigator.brave && typeof navigator.brave.isBrave === 'function'){
      // isBrave() returns a Promise, but presence alone is strong signal
      return true;
    }
    // Fallback: Brave modifies some fingerprinting APIs and its UA on mobile
    // doesn't include "Brave" but this covers desktop
    return false;
  }

  // Also check async version and bail if confirmed
  if(navigator.brave && navigator.brave.isBrave){
    navigator.brave.isBrave().then(yes => { if(yes) return; }).catch(()=>{});
    return; // presence of navigator.brave is enough — it's Brave
  }

  function getOS(){
    const ua = navigator.userAgent;
    const platform = navigator.platform || '';
    if(/android/i.test(ua)) return 'android';
    if(/iPad|iPhone|iPod/.test(ua) || (platform==='MacIntel' && navigator.maxTouchPoints>1)) return 'ios';
    if(/Win/.test(platform)) return 'windows';
    if(/Mac/.test(platform)) return 'mac';
    if(/Linux/.test(platform)) return 'linux';
    return 'unknown';
  }

  const os = getOS();
  const container = document.getElementById('brave-btns-container');

  const dlIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`;
  const appleIcon = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>`;
  const playIcon = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 18.5v-13A1.5 1.5 0 0 1 5.16 4.1l13 6.5a1.5 1.5 0 0 1 0 2.8l-13 6.5A1.5 1.5 0 0 1 3 18.5z"/></svg>`;
  const winIcon = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M0 3.449L9.75 2.1v9.451H0m10.949-9.602L24 0v11.4H10.949M0 12.6h9.75v9.451L0 20.699M10.949 12.6H24V24l-12.9-1.801"/></svg>`;

  if(os === 'android'){
    container.innerHTML = `
      <a class="brave-btn brave-btn-primary" href="https://play.google.com/store/apps/details?id=com.brave.browser" target="_blank" rel="noopener">
        ${playIcon} Get Brave on Google Play
      </a>`;
  } else if(os === 'ios'){
    container.innerHTML = `
      <a class="brave-btn brave-btn-primary" href="https://apps.apple.com/app/brave-private-web-browser-vpn/id1052879175" target="_blank" rel="noopener">
        ${appleIcon} Download on the App Store
      </a>`;
  } else if(os === 'windows'){
    container.innerHTML = `
      <a class="brave-btn brave-btn-primary" href="https://laptop-updates.brave.com/latest/winx64" target="_blank" rel="noopener">
        ${winIcon} Download for Windows (.exe)
      </a>
      <a class="brave-btn brave-btn-secondary" href="https://brave.com/download/" target="_blank" rel="noopener">
        ${dlIcon} Other versions
      </a>`;
  } else if(os === 'mac'){
    container.innerHTML = `
      <a class="brave-btn brave-btn-primary" href="https://laptop-updates.brave.com/latest/osx" target="_blank" rel="noopener">
        ${appleIcon} Download for macOS (.dmg)
      </a>
      <a class="brave-btn brave-btn-secondary" href="https://brave.com/download/" target="_blank" rel="noopener">
        ${dlIcon} Other versions
      </a>`;
  } else {
    container.innerHTML = `
      <div class="brave-store-row">
        <a class="brave-btn brave-btn-primary" href="https://laptop-updates.brave.com/latest/winx64" target="_blank" rel="noopener">${winIcon} Windows</a>
        <a class="brave-btn brave-btn-primary" href="https://laptop-updates.brave.com/latest/osx" target="_blank" rel="noopener">${appleIcon} macOS</a>
      </div>
      <a class="brave-btn brave-btn-secondary" href="https://brave.com/download/" target="_blank" rel="noopener">${dlIcon} More options</a>`;
  }

  // Show popup after short delay
  setTimeout(()=>{
    document.getElementById('brave-overlay').classList.add('visible');
  }, 800);
})();

function closeBravePopup(){
  const overlay = document.getElementById('brave-overlay');
  overlay.style.opacity = '0';
  overlay.style.pointerEvents = 'none';
  localStorage.setItem('sv_brave_dismissed', '1');
}
// Close on backdrop click
document.getElementById('brave-overlay').addEventListener('click', function(e){
  if(e.target === this) closeBravePopup();
});
</script>
