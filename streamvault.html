<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamVault</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --nav-h:64px;
  --gold:#E8C84A;
  --glass:rgba(255,255,255,0.08);
  --glass-border:rgba(255,255,255,0.12);
  --glass-hover:rgba(255,255,255,0.14);
}
html{background:#08080e;color:#fff;font-family:'DM Sans',sans-serif;overflow-x:hidden}body{min-height:100%;background:#08080e;color:#fff;font-family:'DM Sans',sans-serif;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;background:rgba(8,8,14,0.45);pointer-events:none}
/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.2);border-radius:2px}

/* ── NAV ── */
nav{position:fixed;top:16px;left:0;right:0;z-index:300;display:flex;align-items:center;justify-content:space-between;padding:0 40px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:#fff;cursor:pointer;user-select:none}
.logo span{color:var(--gold)}
.nav-pill{display:flex;align-items:center;gap:2px;background:rgba(255,255,255,0.07);backdrop-filter:blur(32px) saturate(180%);-webkit-backdrop-filter:blur(32px) saturate(180%);border:1px solid rgba(255,255,255,0.14);border-radius:50px;padding:6px 8px;box-shadow:0 4px 24px rgba(0,0,0,0.25),inset 0 1px 0 rgba(255,255,255,0.1)}
.nav-item{display:flex;align-items:center;gap:0px;padding:12px 28px;border-radius:50px;font-size:16px;font-weight:400;cursor:pointer;transition:all .35s cubic-bezier(.16,1,.3,1);color:rgba(255,255,255,0.55);white-space:nowrap;user-select:none;letter-spacing:0.2px;overflow:hidden}
.nav-item .nav-icon{width:17px;height:17px;flex-shrink:0;max-width:0;opacity:0;overflow:hidden;transition:max-width .35s cubic-bezier(.16,1,.3,1),opacity .25s,margin-right .35s cubic-bezier(.16,1,.3,1);margin-right:0}
.nav-item:hover{background:rgba(255,255,255,0.09);color:rgba(255,255,255,0.9)}
.nav-item.active{background:#fff;color:#000;font-weight:600;box-shadow:0 2px 12px rgba(0,0,0,0.3);padding:12px 30px}
.nav-item.active .nav-icon{max-width:17px;opacity:1;margin-right:8px}
.nav-search-btn{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;color:rgba(255,255,255,0.6);flex-shrink:0}
.nav-search-btn:hover{background:rgba(255,255,255,0.09);color:rgba(255,255,255,0.95)}
.nav-search-btn svg{width:16px;height:16px}



/* ── SEARCH OVERLAY ── */
.search-overlay{position:fixed;inset:0;z-index:200;pointer-events:none;opacity:0;transition:opacity .3s}
.search-overlay.open{pointer-events:all;opacity:1}
.search-backdrop{position:absolute;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.search-box{position:absolute;top:20px;right:20px;left:20px;max-width:600px;margin:0 auto;transform:translateX(40px);opacity:0;transition:transform .35s cubic-bezier(.16,1,.3,1),opacity .35s}
.search-overlay.open .search-box{transform:translateX(0);opacity:1}
.search-input-wrap{display:flex;align-items:center;gap:12px;background:rgba(20,20,28,0.95);border:1px solid rgba(255,255,255,0.15);border-radius:16px;padding:14px 20px}
.search-input-wrap svg{width:18px;height:18px;color:rgba(255,255,255,0.4);flex-shrink:0}
.search-input{flex:1;background:none;border:none;outline:none;color:#fff;font-size:17px;font-family:'DM Sans',sans-serif}
.search-input::placeholder{color:rgba(255,255,255,0.3)}
.search-close{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.08);border:none;color:rgba(255,255,255,0.6);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:all .2s}
.search-close:hover{background:rgba(255,255,255,0.15);color:#fff}
.search-results{margin-top:12px;background:rgba(15,15,22,0.98);border:1px solid rgba(255,255,255,0.1);border-radius:16px;overflow:hidden;max-height:65vh;overflow-y:auto;display:none}
.search-results.show{display:block}
.search-result-item{display:flex;align-items:center;gap:14px;padding:12px 16px;cursor:pointer;transition:background .15s;border-bottom:1px solid rgba(255,255,255,0.05)}
.search-result-item:last-child{border-bottom:none}
.search-result-item:hover{background:rgba(255,255,255,0.06)}
.search-result-poster{width:44px;height:64px;border-radius:8px;object-fit:cover;background:#1a1a24;flex-shrink:0}
.search-result-info{flex:1;min-width:0}
.search-result-title{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.search-result-meta{font-size:12px;color:rgba(255,255,255,0.45);margin-top:3px}
.search-result-type{font-size:11px;padding:2px 8px;border-radius:20px;background:rgba(232,200,74,0.15);color:var(--gold);font-weight:500}

/* ── GLOBAL BG ── */
.global-bg{position:fixed;inset:-80px;z-index:0;background-size:cover;background-position:center top;filter:blur(80px) saturate(140%);opacity:0.9;transition:background-image 1.2s ease;will-change:background-image;pointer-events:none}
.global-bg::after{content:'';position:absolute;inset:0;background:rgba(8,8,14,0.25)}
/* ── HERO ── */
.hero{position:relative;height:clamp(320px,56.25vw,100vh);overflow:hidden;}
.hero-bg{position:absolute;inset:0;background-size:cover;background-repeat:no-repeat;background-position:center 30%;transition:background-image .8s,opacity .8s;will-change:background-image;-webkit-mask-image:linear-gradient(to bottom,black 0%,black 25%,rgba(0,0,0,0.85) 45%,rgba(0,0,0,0.4) 65%,rgba(0,0,0,0.1) 82%,transparent 92%);mask-image:linear-gradient(to bottom,black 0%,black 25%,rgba(0,0,0,0.85) 45%,rgba(0,0,0,0.4) 65%,rgba(0,0,0,0.1) 82%,transparent 92%)}
.hero-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(to right,rgba(8,8,14,0.75) 0%,rgba(8,8,14,0.4) 35%,rgba(8,8,14,0.05) 60%,transparent 100%),linear-gradient(to bottom,rgba(8,8,14,0.4) 0%,transparent 20%);pointer-events:none}
.hero-content{position:relative;z-index:2;height:100%;display:flex;align-items:flex-end;padding:0 70px 120px}
.hero-info{max-width:820px}
.hero-logo-img{max-width:720px;max-height:320px;object-fit:contain;margin-bottom:28px;filter:drop-shadow(0 4px 20px rgba(0,0,0,0.8))}
.hero-logo-fallback{font-family:'Bebas Neue',sans-serif;font-size:190px;letter-spacing:2px;margin-bottom:20px;line-height:0.95;text-shadow:0 4px 40px rgba(0,0,0,0.9)}
.hero-meta{display:flex;align-items:center;gap:14px;margin-bottom:22px}
.hero-year,.hero-rating,.hero-genre{font-size:19px;color:rgba(255,255,255,0.7)}
.hero-dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,0.4)}
.hero-rating{color:var(--gold);font-weight:600}
.hero-desc{font-size:21px;line-height:1.7;color:rgba(255,255,255,0.78);margin-bottom:40px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.hero-actions{display:flex;align-items:center;gap:16px}
.btn-play{display:flex;align-items:center;gap:12px;background:#ffffff !important;color:#000 !important;border:none;padding:18px 42px;border-radius:50px;font-size:19px;font-weight:600;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;position:relative;z-index:10;box-shadow:0 2px 20px rgba(0,0,0,0.3)}
.btn-play:hover{background:rgba(255,255,255,0.85);transform:scale(1.02)}
.btn-play svg{width:22px;height:22px}
.btn-trailer{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.12);color:#fff;border:1.5px solid rgba(255,255,255,0.4);padding:18px 34px;border-radius:50px;font-size:17px;font-weight:500;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.btn-trailer:hover{background:rgba(255,255,255,0.22);border-color:rgba(255,255,255,0.75)}
.btn-trailer svg{width:19px;height:19px}
/* Combined +/i pill */
.btn-icon-pill{display:flex;align-items:center;border-radius:50px;border:1.5px solid rgba(255,255,255,0.35);background:rgba(255,255,255,0.18);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);transition:border-color .2s,background .2s;color:#fff}
.btn-icon-pill:hover{border-color:rgba(255,255,255,0.7);background:rgba(255,255,255,0.26)}
.btn-icon-half{display:flex;align-items:center;justify-content:center;width:76px;height:62px;background:none;border:none;outline:none;cursor:pointer;color:#fff;flex-shrink:0;transition:transform .2s cubic-bezier(.16,1,.3,1);-webkit-appearance:none;appearance:none;font-family:inherit}
.btn-icon-half:hover{transform:scale(1.25)}
.btn-icon-divider{width:1.5px;height:26px;background:rgba(255,255,255,0.4);border-radius:1px;flex-shrink:0;pointer-events:none}
.btn-icon-half svg{width:26px;height:26px;pointer-events:none;display:block;stroke:#fff;stroke-width:2}
.hero-mute-btn{position:absolute;bottom:36px;right:40px;z-index:4;width:42px;height:42px;border-radius:50%;background:rgba(20,20,28,0.6);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1.5px solid rgba(255,255,255,0.3);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.hero-mute-btn:hover{background:rgba(255,255,255,0.18);border-color:rgba(255,255,255,0.6)}
.hero-mute-btn svg{width:18px;height:18px}
.hero-indicators{position:absolute;bottom:28px;right:32px;display:flex;flex-direction:row;gap:6px;z-index:2;align-items:center}
.hero-dot-ind{height:8px;width:8px;border-radius:50%;background:rgba(255,255,255,0.35);cursor:pointer;transition:width .3s cubic-bezier(.16,1,.3,1),border-radius .3s;position:relative;overflow:hidden;flex-shrink:0}
.hero-dot-ind.active{width:28px;border-radius:4px}
.hero-dot-ind.active::after{content:'';position:absolute;inset:0;background:#fff;transform:scaleX(0);transform-origin:left;animation:heroFill var(--hero-duration,6000ms) linear forwards}
@keyframes heroFill{from{transform:scaleX(0)}to{transform:scaleX(1)}}

/* ── PLAYER MODAL ── */
.player-modal{position:fixed;inset:0;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;gap:0}
.player-modal.open{opacity:1;pointer-events:all}
.player-backdrop{position:absolute;inset:0;background:rgba(0,0,0,0.94);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);cursor:pointer}
.player-container{position:relative;z-index:1;width:90vw;max-width:1280px;transform:scale(0.95);transition:transform .35s cubic-bezier(.16,1,.3,1)}
.player-modal.open .player-container{transform:scale(1)}
.player-topbar{display:flex;align-items:center;justify-content:space-between;padding:0 0 12px}
.player-title{font-size:15px;font-weight:500;color:rgba(255,255,255,0.75);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:70%}
.player-close{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.18);color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;flex-shrink:0}
.player-close:hover{background:rgba(255,255,255,0.22)}
.player-servers{display:flex;align-items:center;gap:8px;padding:0 0 10px;flex-wrap:wrap}
.player-wrap{position:relative;width:100%;aspect-ratio:16/9;border-radius:14px;overflow:hidden;background:#000;box-shadow:0 30px 80px rgba(0,0,0,0.9)}
.player-wrap iframe{width:100%;height:100%;border:none;display:block}

/* ── ROWS ── */
.rows-section{position:relative;z-index:2;margin-top:-120px;padding:120px 0 60px}
.row-block{margin-bottom:48px;overflow:visible;position:relative}
.row-block::before,.row-block::after{display:none}
.row-track-wrap{position:relative;padding:0 40px;overflow:visible}
.row-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;padding:0 40px}
.row-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1.5px;color:rgba(255,255,255,0.95)}
.row-title .highlight{color:var(--gold)}
.row-see-all{font-size:13px;color:rgba(255,255,255,0.4);cursor:pointer;transition:color .2s}
.row-see-all:hover{color:#fff}
.row-track{display:flex;gap:12px;overflow-x:auto;padding:12px 4px 20px;scrollbar-width:none}
.row-track::-webkit-scrollbar{display:none}
.card{flex-shrink:0;cursor:pointer;position:relative;border-radius:10px;transition:transform .25s}
.card:hover{transform:scale(1.06);z-index:10}
.card img{width:100%;height:100%;object-fit:cover;display:block;background:#1a1a24;border-radius:10px}
.card-sm{width:200px;height:300px}
.card-md{width:340px;height:191px}
.card-lg{width:240px;height:360px}
.card-rank{position:absolute;top:0;left:0;font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1.5px;color:#fff;background:linear-gradient(135deg,#c0001a 55%,#8b0013 100%);padding:7px 14px 7px 10px;line-height:1;pointer-events:none;user-select:none;border-radius:10px 0 18px 0;box-shadow:2px 3px 10px rgba(0,0,0,0.6);z-index:2}
.card-rank::before{content:'#';font-size:13px;opacity:0.7;margin-right:2px;vertical-align:2px}
.card-quality{position:absolute;bottom:8px;right:8px;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.8px;padding:3px 7px;border-radius:5px;pointer-events:none;user-select:none;z-index:2;text-transform:uppercase}
.quality-cam{background:rgba(30,30,30,0.85);color:rgba(255,255,180,0.85);border:1px solid rgba(255,255,100,0.2)}
.quality-hd{background:rgba(0,100,220,0.85);color:#fff;border:1px solid rgba(80,160,255,0.4)}
.quality-soon{background:rgba(80,0,160,0.85);color:#e0bbff;border:1px solid rgba(160,80,255,0.4)}
.card-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.95) 0%,rgba(0,0,0,0.6) 45%,rgba(0,0,0,0.2) 100%);opacity:0;transition:opacity .25s;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.card-play{width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,0.95);display:flex;align-items:center;justify-content:center;transform:scale(0.8);transition:transform .25s cubic-bezier(.16,1,.3,1)}
.card-play svg{width:18px;height:18px;color:#000;margin-left:3px}
.card-hover-title{font-size:13px;font-weight:600;color:#fff;text-align:center;padding:0 10px;transform:translateY(6px);transition:transform .25s cubic-bezier(.16,1,.3,1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.card-meta{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:500;transform:translateY(6px);transition:transform .25s cubic-bezier(.16,1,.3,1) .04s}
.card-meta-rating{color:var(--gold)}
.card-meta-dot{width:2px;height:2px;border-radius:50%;background:rgba(255,255,255,0.4)}
.card-meta-year{color:rgba(255,255,255,0.8)}
.card:hover .card-overlay{opacity:1}
.card:hover .card-play{transform:scale(1)}
.card:hover .card-hover-title{transform:translateY(0)}
.card:hover .card-meta{transform:translateY(0)}
.card:hover .card-overlay{opacity:1}
.card-label{position:absolute;bottom:10px;left:10px;right:10px;font-size:12px;font-weight:500;color:#fff;opacity:0;transition:opacity .2s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card:hover .card-label{opacity:1}
.network-badge{position:absolute;top:8px;right:8px;font-size:10px;font-weight:600;padding:3px 8px;border-radius:4px;letter-spacing:0.5px}
.badge-netflix{background:#E50914;color:#fff}
.badge-disney{background:#113CCF;color:#fff}
.badge-hbo{background:#5A189A;color:#fff}
.badge-apple{background:#555;color:#fff}
.badge-amazon{background:#00A8E0;color:#fff}

/* ── PLATFORM FILTER BAR ── */
.platform-dropdown-wrap{display:none;position:relative;flex:1}
.platform-select{width:100%;appearance:none;-webkit-appearance:none;background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.15);border-radius:50px;padding:10px 40px 10px 18px;font-size:14px;font-weight:500;color:#fff;font-family:'DM Sans',sans-serif;cursor:pointer;outline:none}
.platform-select option{background:#1a1a24;color:#fff}
.platform-select-arrow{position:absolute;right:14px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:rgba(255,255,255,0.5);pointer-events:none}
.platform-bar{padding:0 40px;margin-bottom:32px;margin-top:8px}
.platform-bar-inner{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.platform-bar-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1.5px;color:rgba(255,255,255,0.95);white-space:nowrap;flex-shrink:0}
.platform-bar-title .highlight{color:var(--gold)}
.platform-pills{display:flex;gap:10px;flex-wrap:wrap}.platform-pill{display:flex;align-items:center;gap:8px;padding:10px 20px;border-radius:50px;border:1.5px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.05);cursor:pointer;transition:all .2s;font-size:13px;font-weight:600;color:rgba(255,255,255,0.6);white-space:nowrap;user-select:none;font-family:'DM Sans',sans-serif}
.platform-pill:hover{border-color:rgba(255,255,255,0.35);background:rgba(255,255,255,0.1);color:#fff}
.platform-pill.active{border-color:transparent;color:#fff;box-shadow:0 2px 16px rgba(0,0,0,0.4)}
.platform-pill .pp-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.platform-pill.pp-netflix.active{background:#E50914}
.platform-pill.pp-prime.active{background:#00A8E0}
.platform-pill.pp-disney.active{background:#113CCF}
.platform-pill.pp-apple.active{background:#555}
.platform-pill.pp-hbo.active{background:#5A189A}
.platform-pill.pp-paramount.active{background:#0064FF}
.platform-pill.pp-netflix .pp-dot{background:#E50914}
.platform-pill.pp-prime .pp-dot{background:#00A8E0}
.platform-pill.pp-disney .pp-dot{background:#113CCF}
.platform-pill.pp-apple .pp-dot{background:#888}
.platform-pill.pp-hbo .pp-dot{background:#5A189A}
.platform-pill.pp-paramount .pp-dot{background:#0064FF}
/* ── SEE ALL OVERLAY ── */
/* ── CARD ENTRANCE ANIMATION ── */
@keyframes cardIn{
  from{opacity:0;transform:translateY(22px) scale(0.94)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
.card{opacity:0;animation:cardIn .38s cubic-bezier(.16,1,.3,1) forwards}

/* ── SEE ALL PAGE ── */
.seeall-page{display:none;position:fixed;inset:0;z-index:160;overflow-y:auto;background:#08080e;-webkit-overflow-scrolling:touch}
.seeall-page.open{display:block}
.seeall-hero{position:relative;flex-shrink:0}
.seeall-back-btn{position:absolute;top:clamp(16px,4vw,28px);left:clamp(16px,4vw,28px);z-index:10;width:40px;height:40px;border-radius:50%;background:rgba(8,8,14,0.6);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1.5px solid rgba(255,255,255,0.2);display:none;align-items:center;justify-content:center;cursor:pointer;transition:background .2s}
.seeall-back-btn:hover{background:rgba(255,255,255,0.15)}
.seeall-back-btn svg{width:18px;height:18px;stroke:#fff}
.seeall-body{padding:28px 40px 100px}
.seeall-label{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;margin-bottom:20px;color:rgba(255,255,255,0.9)}
.seeall-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px}
@media(max-width:640px){
  .seeall-back-btn{display:flex}
  .seeall-body{padding:20px 16px 120px}
  .seeall-label{font-size:20px;margin-bottom:14px}
  .seeall-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px}
}
@media(min-width:641px)and(max-width:960px){
  .seeall-body{padding:24px 28px 60px}
  .seeall-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px}
}
@media(max-width:640px){
  
}

/* ── DETAIL PAGE ── */
.detail-page{display:none;position:fixed;inset:0;z-index:150;overflow-y:auto;overflow-x:hidden;background:#08080e;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.detail-page.open{display:block}
.detail-ambient-bg{position:fixed;inset:-80px;z-index:0;background-size:cover;background-position:center top;filter:blur(80px) saturate(140%);opacity:0.9;transition:background-image 1.2s ease;will-change:background-image;pointer-events:none}
.detail-ambient-bg::after{content:'';position:absolute;inset:0;background:rgba(8,8,14,0.25)}
.detail-hero{position:relative;z-index:1;height:85vh;min-height:560px;overflow:hidden}
.detail-bg{position:absolute;top:0;bottom:-60px;left:-60px;right:-60px;background-size:cover;background-repeat:no-repeat;background-position:center top;transition:background-image .6s;-webkit-mask-image:linear-gradient(to bottom,black 0%,black 25%,rgba(0,0,0,0.85) 45%,rgba(0,0,0,0.4) 65%,rgba(0,0,0,0.1) 82%,transparent 92%);mask-image:linear-gradient(to bottom,black 0%,black 25%,rgba(0,0,0,0.85) 45%,rgba(0,0,0,0.4) 65%,rgba(0,0,0,0.1) 82%,transparent 92%)}
.detail-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(to right,rgba(8,8,14,0.85) 0%,rgba(8,8,14,0.5) 40%,transparent 70%),linear-gradient(to bottom,rgba(8,8,14,0.4) 0%,transparent 20%)}

.detail-back{position:absolute;top:24px;left:28px;z-index:3;width:42px;height:42px;border-radius:50%;background:rgba(0,0,0,0.5);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
.detail-back:hover{background:rgba(255,255,255,0.15)}
.detail-back svg{width:18px;height:18px}
.detail-hero-content{position:absolute;inset:0;z-index:2;display:flex;align-items:flex-end;padding:0 48px 56px;gap:40px}
.detail-left{flex:1;max-width:580px}
.detail-logo{max-width:280px;max-height:120px;object-fit:contain;margin-bottom:16px;filter:drop-shadow(0 4px 20px rgba(0,0,0,0.8))}
.detail-logo-text{font-family:'Bebas Neue',sans-serif;font-size:56px;letter-spacing:2px;margin-bottom:14px;line-height:1;text-shadow:0 4px 30px rgba(0,0,0,0.8)}
.detail-badges{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
.pill-badge{padding:5px 14px;border-radius:50px;font-size:12px;font-weight:500;border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.8);background:rgba(255,255,255,0.06)}
.pill-badge.gold{border-color:rgba(232,200,74,0.4);color:var(--gold);background:rgba(232,200,74,0.08)}
.detail-desc{font-size:15px;line-height:1.75;color:rgba(255,255,255,0.72);margin-bottom:28px;max-width:520px}
.detail-actions{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.btn-play-detail{display:flex;align-items:center;gap:10px;background:#fff;color:#000;border:none;padding:15px 34px;border-radius:50px;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.btn-play-detail:hover{background:rgba(255,255,255,0.88);transform:scale(1.02)}
.btn-play-detail svg{width:17px;height:17px}
.btn-outline{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.1);color:#fff;border:1.5px solid rgba(255,255,255,0.25);padding:14px 22px;border-radius:50px;font-size:15px;font-weight:500;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;backdrop-filter:blur(10px)}
.btn-outline:hover{background:rgba(255,255,255,0.18);border-color:rgba(255,255,255,0.5)}
.btn-outline svg{width:17px;height:17px}
/* Frosted glass info panel */
.detail-info-panel{flex-shrink:0;width:200px;background:rgba(255,255,255,0.07);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);border:1px solid rgba(255,255,255,0.12);border-radius:14px;padding:14px 16px;display:flex;flex-direction:column;gap:10px;align-self:flex-end;margin-bottom:4px}
.info-row{display:flex;flex-direction:column;gap:2px}
.info-label{font-size:9px;color:rgba(255,255,255,0.38);text-transform:uppercase;letter-spacing:0.8px}
.info-value{font-size:12px;font-weight:500;color:rgba(255,255,255,0.9);line-height:1.4}
.info-divider{height:1px;background:rgba(255,255,255,0.08)}
/* Below hero sections */
.detail-below{padding:0 48px 80px;background:transparent;margin-top:-2px;position:relative;z-index:1}
/* Actors */
.section-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1.5px;color:rgba(255,255,255,0.9);margin-bottom:20px;margin-top:48px}
.actors-row{display:flex;gap:16px;overflow-x:auto;padding-bottom:12px;scrollbar-width:none}
.actors-row::-webkit-scrollbar{display:none}
.actor-card{flex-shrink:0;width:100px;cursor:pointer}
.actor-img{width:100px;height:100px;border-radius:50%;object-fit:cover;background:#1a1a24;margin-bottom:8px;border:2px solid rgba(255,255,255,0.08)}
.actor-name{font-size:12px;font-weight:500;text-align:center;color:rgba(255,255,255,0.85);line-height:1.3}
.actor-char{font-size:11px;color:rgba(255,255,255,0.4);text-align:center;margin-top:2px;line-height:1.3}
/* Similar movies */
.similar-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px}
.sim-card{border-radius:10px;overflow:hidden;cursor:pointer;transition:transform .2s;background:#1a1a24;aspect-ratio:2/3;position:relative}
.sim-card:hover{transform:scale(1.04)}
.sim-card img{width:100%;height:100%;object-fit:cover;display:block}
.sim-card-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.85) 0%,transparent 50%);opacity:0;transition:opacity .2s}
.sim-card:hover .sim-card-overlay{opacity:1}
.sim-card-title{position:absolute;bottom:10px;left:10px;right:10px;font-size:12px;font-weight:500;color:#fff;opacity:0;transition:opacity .2s;line-height:1.3}
.sim-card:hover .sim-card-title{opacity:1}
/* Episodes */
.seasons-section{margin-top:0}
.seasons-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;margin-bottom:16px;color:rgba(255,255,255,0.9)}
.season-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.season-tab{padding:8px 20px;border-radius:50px;font-size:13px;cursor:pointer;transition:all .2s;border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.5);background:none;font-family:'DM Sans',sans-serif}
.season-tab.active{background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.3);color:#fff}
.episode-list{display:flex;flex-direction:column;gap:12px}
.episode-item{display:flex;align-items:center;gap:16px;padding:16px;background:rgba(255,255,255,0.04);border-radius:12px;cursor:pointer;transition:background .2s;border:1px solid rgba(255,255,255,0.06)}
.episode-item:hover{background:rgba(255,255,255,0.08)}
.ep-num{font-size:13px;color:rgba(255,255,255,0.3);min-width:24px;text-align:center}
.ep-thumb{width:120px;height:68px;border-radius:8px;object-fit:cover;background:#1a1a24;flex-shrink:0}
.ep-info{flex:1}
.ep-title{font-size:14px;font-weight:500;margin-bottom:4px}
.ep-desc{font-size:12px;color:rgba(255,255,255,0.45);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.5}
.ep-runtime{font-size:12px;color:rgba(255,255,255,0.35);margin-top:4px}
.ep-play{width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;background:none}
.ep-play:hover{background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.4)}

/* ── SKELETON ── */
.skel{background:linear-gradient(90deg,rgba(255,255,255,0.05) 0%,rgba(255,255,255,0.09) 50%,rgba(255,255,255,0.05) 100%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── LOADING ── */
.spinner{width:40px;height:40px;border:2px solid rgba(255,255,255,0.1);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;margin:60px auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── PAGES ── */
.page{display:none}.page.active{display:block}
.page-header{padding:calc(var(--nav-h) + 40px) 40px 32px;font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px}

/* ── MYLIST ── */
.mylist-grid{padding:0 40px 60px;display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:16px}
.mylist-empty{padding:80px 40px;text-align:center;color:rgba(255,255,255,0.3);font-size:15px}

/* ── TOAST ── */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(20,20,28,0.95);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.12);color:#fff;padding:12px 24px;border-radius:50px;font-size:14px;z-index:999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── BRAVE POPUP ── */
#brave-overlay{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.75);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);opacity:0;transition:opacity .4s cubic-bezier(.16,1,.3,1);pointer-events:none}
#brave-overlay.visible{opacity:1;pointer-events:all}
#brave-modal{background:linear-gradient(145deg,#0f0f1a,#13131f);border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:40px 36px 32px;max-width:440px;width:calc(100% - 40px);text-align:center;box-shadow:0 24px 80px rgba(0,0,0,0.7),0 0 0 1px rgba(255,255,255,0.05) inset;transform:translateY(20px) scale(0.97);transition:transform .4s cubic-bezier(.16,1,.3,1)}
#brave-overlay.visible #brave-modal{transform:translateY(0) scale(1)}
.brave-lion{width:72px;height:72px;margin:0 auto 20px;display:block}
.brave-title{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px;color:#fff;margin-bottom:8px}
.brave-title span{color:#FB542B}
.brave-sub{font-size:15px;color:rgba(255,255,255,0.55);line-height:1.6;margin-bottom:28px}
.brave-btns{display:flex;flex-direction:column;gap:10px}
.brave-btn{display:flex;align-items:center;justify-content:center;gap:10px;padding:15px 24px;border-radius:50px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;border:none;font-family:'DM Sans',sans-serif;text-decoration:none;width:100%}
.brave-btn-primary{background:#FB542B;color:#fff;box-shadow:0 4px 24px rgba(251,84,43,0.35)}
.brave-btn-primary:hover{background:#ff6640;transform:translateY(-1px);box-shadow:0 6px 28px rgba(251,84,43,0.45)}
.brave-btn-secondary{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.85);border:1px solid rgba(255,255,255,0.12)}
.brave-btn-secondary:hover{background:rgba(255,255,255,0.12);color:#fff}
.brave-btn svg{width:20px;height:20px;flex-shrink:0}
.brave-store-row{display:flex;gap:10px}
.brave-store-row .brave-btn{flex:1}
.brave-skip{margin-top:18px;font-size:13px;color:rgba(255,255,255,0.3);cursor:pointer;transition:color .2s;background:none;border:none;font-family:'DM Sans',sans-serif;width:100%;padding:6px}
.brave-skip:hover{color:rgba(255,255,255,0.6)}

/* ══════════════════════════════════════
   MOBILE  (≤640px) — placed last so it
   wins over every base style above
   ══════════════════════════════════════ */
@media(max-width:640px){
  :root{--nav-h:72px}

  /* ── NAV → frosted pill, bottom-center ── */
  nav{
    top:auto;bottom:16px;left:50%;right:auto;
    transform:translateX(-50%);
    padding:0;width:auto;
    justify-content:center;background:none;
  }
  .logo{display:none}
  .nav-pill{
    display:flex;flex-direction:row;align-items:center;
    gap:0px;padding:6px 6px;
    border-radius:50px;
    background:rgba(255,255,255,0.07);
    backdrop-filter:blur(32px) saturate(180%);
    -webkit-backdrop-filter:blur(32px) saturate(180%);
    border:1px solid rgba(255,255,255,0.14);
    box-shadow:0 4px 24px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.1);
    max-width:calc(100vw - 32px);
    overflow:hidden;
  }
  /* Hide TV toggle on mobile — not needed */
  .nav-item{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:3px;padding:8px 14px;
    border-radius:50px;font-size:10px;font-weight:500;
    color:rgba(255,255,255,0.45);letter-spacing:0.2px;
    flex-shrink:1;
  }
  .nav-item .nav-icon{
    width:20px;height:20px;flex-shrink:0;
    max-width:20px !important;opacity:1 !important;
    margin-right:0 !important;overflow:visible;
  }
  .nav-item.active{
    background:#fff;color:#000;font-weight:700;
    box-shadow:0 2px 12px rgba(0,0,0,0.3);
    padding:8px 16px;
  }
  .nav-item.active .nav-icon{max-width:20px !important;opacity:1 !important;margin-right:0 !important}
  .nav-search-btn{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:3px;padding:8px 14px;height:auto;width:auto;
    border-radius:50px;color:rgba(255,255,255,0.45);font-size:10px;
    flex-shrink:1;
  }
  .nav-search-btn svg{width:20px;height:20px}
  .nav-search-btn::after{content:'Search';font-size:10px;font-weight:500}

  /* ── Hero ── */
  .hero{height:100vw;min-height:340px;margin-top:0}
  .hero-bg{background-position:center top !important;top:0}
  .hero-content{
    position:absolute;
    bottom:0;left:0;right:0;
    height:auto !important;
    padding:0 20px 110px;
    align-items:flex-end !important;
    justify-content:flex-start !important;
  }
  .hero-logo-img{max-width:220px;max-height:110px;margin-bottom:14px}
  .hero-logo-fallback{font-size:60px;margin-bottom:12px}
  .hero-info{max-width:100%;width:100%}
  .hero-meta{gap:8px;margin-bottom:12px}
  .hero-year,.hero-rating,.hero-genre{font-size:13px}
  .hero-desc{font-size:14px;line-height:1.6;margin-bottom:20px;-webkit-line-clamp:2}
  .hero-actions{gap:10px}
  .btn-play{padding:13px 26px;font-size:15px}
  .btn-play svg{width:17px;height:17px}
  .btn-trailer{padding:13px 20px;font-size:13px}
  .btn-trailer svg{width:15px;height:15px}
  .btn-icon-half{width:52px;height:48px}
  .btn-icon-half svg{width:20px;height:20px}
  .btn-icon-divider{height:20px}
  .hero-mute-btn{bottom:110px;right:16px;width:36px;height:36px}
  .hero-indicators{bottom:72px;left:50%;right:auto;transform:translateX(-50%)}

  /* ── Rows ── */
  .rows-section{margin-top:-60px;padding:60px 0 120px}
  .row-block{margin-bottom:32px}
  .row-header{padding:0 16px;margin-bottom:12px}
  .row-title{font-size:17px}
  .row-track-wrap{padding:0 16px;-webkit-mask-image:none;mask-image:none}
  .row-track{gap:10px;padding:6px 2px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch;overscroll-behavior-x:contain}

  /* ── Cards ── */
  .card-sm{width:120px;height:180px}
  .card-md{width:200px;height:113px}
  .card-lg{width:140px;height:210px}
  .card-rank{font-size:16px;padding:5px 10px 5px 8px}
  .card:hover{transform:none}
  .card:active{transform:scale(0.97)}
  .card .card-overlay{opacity:1;background:linear-gradient(to top,rgba(0,0,0,0.85) 0%,rgba(0,0,0,0.3) 50%,transparent 100%)}
  .card .card-play{transform:scale(0.85)}
  .card .card-hover-title{transform:translateY(0);font-size:11px}
  .card .card-meta{transform:translateY(0)}

  /* ── Page header ── */
  .page-header{padding:80px 16px 20px;font-size:24px}

  /* ── Detail page ── */
  .detail-hero{height:auto;min-height:0}
  .detail-hero-content{position:relative;inset:auto;flex-direction:column;padding:80px 16px 24px;gap:12px;justify-content:flex-start !important;align-items:flex-start !important}
  .detail-bg{position:absolute;inset:0;min-height:320px}
  .detail-left{max-width:100%}
  .detail-logo{max-width:180px;max-height:80px;margin-bottom:10px}
  .detail-logo-text{font-size:36px;margin-bottom:10px}
  .detail-badges{gap:6px;margin-bottom:12px}
  .pill-badge{font-size:11px;padding:4px 10px}
  .detail-desc{font-size:13px;margin-bottom:16px;max-width:100%}
  .detail-actions{gap:8px}
  .btn-play-detail{padding:12px 22px;font-size:14px}
  .btn-outline{padding:11px 16px;font-size:13px}
  .detail-info-panel{display:none}
  .detail-below{padding:0 16px 120px}
  .section-title{font-size:18px;margin-top:28px;margin-bottom:14px}
  .actor-card{width:72px}
  .actor-img{width:72px;height:72px}
  .actor-name{font-size:11px}
  .actor-char{font-size:10px}
  .similar-grid{grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px}
  .detail-back{top:16px;left:16px;width:36px;height:36px}

  /* ── Episodes ── */
  .episode-item{gap:10px;padding:12px}
  .ep-thumb{width:90px;height:51px}
  .ep-title{font-size:13px}
  .ep-desc{-webkit-line-clamp:2;font-size:12px}
  .ep-num{font-size:12px;min-width:18px}

  /* ── Player ── */
  .player-container{width:100vw}
  .player-topbar{padding:8px 12px}
  .player-title{font-size:13px}
  .player-wrap{border-radius:0}

  /* ── Search ── */
  .search-box{top:10px;right:12px;left:12px}
  .search-input{font-size:15px}
  .search-results{max-height:55vh}
  .search-result-poster{width:36px;height:52px}

  /* ── Brave popup ── */
  #brave-modal{padding:28px 20px 24px}
  .brave-title{font-size:26px}
  .brave-sub{font-size:13px;margin-bottom:20px}
  .brave-btn{padding:13px 18px;font-size:14px}
}

/* TV mode via media query as fallback — main TV styles applied via .tv-mode class */
@media(min-width:1281px) and (max-resolution:1.5dppx) and (-webkit-max-device-pixel-ratio:1.5){

  /* Nav */
  nav{top:10px;padding:0 28px}
  .logo{font-size:18px}
  .nav-pill{padding:4px 6px}
  .nav-item{padding:7px 16px;font-size:12px}
  .nav-item.active{padding:7px 18px}
  .nav-search-btn{width:28px;height:28px}
  .nav-search-btn svg{width:13px;height:13px}

  /* Hero */
  .hero{height:clamp(240px,56.25vw,52vh)}
  .hero-content{padding:0 40px 36px}
  .hero-info{max-width:520px}
  .hero-logo-img{max-width:260px;max-height:110px;margin-bottom:12px}
  .hero-logo-fallback{font-size:80px;margin-bottom:10px}
  .hero-meta{gap:8px;margin-bottom:10px}
  .hero-year,.hero-rating,.hero-genre{font-size:12px}
  .hero-dot{width:3px;height:3px}
  .hero-desc{font-size:12px;line-height:1.55;margin-bottom:16px;-webkit-line-clamp:2}

  /* Buttons — all inline, no wrap */
  .hero-actions{display:flex;flex-direction:row;flex-wrap:nowrap;align-items:center;gap:8px}
  .btn-play{padding:10px 22px;font-size:12px;gap:7px;flex-shrink:0;white-space:nowrap;border-radius:50px}
  .btn-play svg{width:14px;height:14px}
  .btn-trailer{padding:10px 16px;font-size:12px;gap:7px;flex-shrink:0;white-space:nowrap;border-radius:50px}
  .btn-trailer svg{width:13px;height:13px}
  .btn-icon-pill{flex-shrink:0;border-radius:50px}
  .btn-icon-half{width:40px;height:36px}
  .btn-icon-half svg{width:15px;height:15px}
  .btn-icon-divider{height:16px}
  .hero-mute-btn{width:30px;height:30px;bottom:14px;right:20px}
  .hero-mute-btn svg{width:13px;height:13px}
  .hero-indicators{bottom:10px}

  /* Rows */
  .rows-section{margin-top:-60px;padding:60px 0 30px}
  .row-block{margin-bottom:20px}
  .row-header{padding:0 28px;margin-bottom:8px}
  .row-title{font-size:14px}
  .platform-bar{padding:0 16px}
  .platform-bar-inner{flex-wrap:nowrap;gap:12px;align-items:center}
  .platform-pills{display:none !important}
  .platform-dropdown-wrap{display:flex !important;align-items:center;width:100%}
  .platform-bar-inner{flex-wrap:nowrap !important;gap:10px}

<script>



const API_KEY = 'e7e658fd82cc0dd5ffd5cb4949f45b2c';
const IMG = 'https://image.tmdb.org/t/p/';
const myList = JSON.parse(localStorage.getItem('myList')||'[]');
let heroItems = [], heroIndex = 0;
let currentDetail = null;
// Hero trailer candidates stored for Play Trailer button
let _heroTrailerKey = null;

/* ── API ── */
async function api(path, params=''){
  const r = await fetch(`https://api.themoviedb.org/3${path}?api_key=${API_KEY}&${params}`);
  return r.json();
}

/* ── HERO ── */
const HERO_DURATION = 6000; // ms per slide
let heroTimer = null;

async function initHero(){
  const [mov,tv] = await Promise.all([
    api('/trending/movie/day'),
    api('/trending/tv/day')
  ]);
  const items = [
    ...mov.results.slice(0,5).map(x=>({...x,_type:'movie'})),
    ...tv.results.slice(0,4).map(x=>({...x,_type:'tv'}))
  ].filter(x=>x.backdrop_path);
  // Shuffle and pick 6
  items.sort(()=>Math.random()-0.5);
  heroItems = items.slice(0,6);
  heroIndex = 0;
  buildHeroIndicators();
  await loadHeroItem(0);
  startHeroRotation();
}

function startHeroRotation(){
  clearTimeout(heroTimer);
  heroTimer = setTimeout(async()=>{
    heroIndex = (heroIndex+1) % heroItems.length;
    await loadHeroItem(heroIndex);
    startHeroRotation();
  }, HERO_DURATION);
}

function advanceHero(){
  clearTimeout(heroTimer);
  heroIndex = (heroIndex+1) % heroItems.length;
  loadHeroItem(heroIndex);
  startHeroRotation();
}

function buildHeroIndicators(){
  const el = document.getElementById('heroIndicators');
  el.style.display = heroItems.length > 1 ? 'flex' : 'none';
  el.innerHTML = '';
  heroItems.forEach((_,i)=>{
    const d = document.createElement('div');
    d.className = 'hero-dot-ind';
    d.style.setProperty('--hero-duration', HERO_DURATION+'ms');
    d.onclick = ()=>jumpHero(i);
    el.appendChild(d);
  });
}

async function jumpHero(i){
  clearTimeout(heroTimer);
  heroIndex = i;
  await loadHeroItem(i);
  startHeroRotation();
}

function updateHeroIndicators(i){
  document.querySelectorAll('.hero-dot-ind').forEach((d,idx)=>{
    d.classList.remove('active');
    // Force reflow to restart animation
    void d.offsetWidth;
    if(idx===i){
      d.style.setProperty('--hero-duration', HERO_DURATION+'ms');
      d.classList.add('active');
    }
  });
}

async function loadHeroItem(i){
  const item = heroItems[i];
  const type = item._type;
  const detail = await api(`/${type}/${item.id}`,`append_to_response=images,videos`);
  const backdrop = detail.backdrop_path ? `${IMG}original${detail.backdrop_path}` : '';
  const heroBg = document.getElementById('heroBg');
  if(backdrop){
    heroBg.style.backgroundImage = `url(${backdrop})`;
    document.getElementById('globalBg').style.backgroundImage = `url(${backdrop})`;
  }

  const logo = detail.images?.logos?.find(l=>l.iso_639_1==='en' && l.file_path);
  const logoEl = document.getElementById('heroLogoImg');
  const titleEl = document.getElementById('heroTitle');
  if(logo){
    logoEl.src = `${IMG}w300${logo.file_path}`;
    logoEl.style.display='block';
    titleEl.style.display='none';
  } else {
    logoEl.style.display='none';
    titleEl.style.display='block';
    titleEl.textContent = detail.title||detail.name||'';
  }

  const genres = (detail.genres||[]).slice(0,2).map(g=>g.name).join(' · ');
  const year = (detail.release_date||detail.first_air_date||'').split('-')[0];
  const rating = detail.vote_average ? detail.vote_average.toFixed(1) : '';
  document.getElementById('heroRating').textContent = rating ? `★ ${rating}` : '';
  document.getElementById('heroYear').textContent = year;
  document.getElementById('heroGenre').textContent = genres;
  document.getElementById('heroDesc').textContent = detail.overview||'';
  updateHeroIndicators(i);

  // Store trailer key for cinema button
  const videos = detail.videos?.results || [];
  const trailerVid = videos.find(v=>v.site==='YouTube' && v.type==='Trailer')
    || videos.find(v=>v.site==='YouTube' && v.type==='Teaser')
    || videos.find(v=>v.site==='YouTube');
  _heroTrailerKey = trailerVid?.key || null;

  document.getElementById('heroPlayBtn').onclick = ()=>playVidking(item.id, type, detail.title||detail.name);
  // Play Trailer button — opens cinema modal
  const trailerBtnEl = document.getElementById('heroTrailerBtn');
  if(trailerBtnEl){
    trailerBtnEl.style.display = _heroTrailerKey ? 'flex' : 'none';
    trailerBtnEl.onclick = ()=>{ openCinema(_heroTrailerKey); };
  }
  document.getElementById('heroAddBtn').onclick = ()=>toggleList(detail);
  document.getElementById('heroInfoBtn').onclick = ()=>openDetail(item.id, type);
}

/* ── PAGE HERO (Movies / Shows) ── */
async function loadPageHero(suffix, type){
  const data = await api(`/trending/${type}/day`);
  const pool = (data.results||[]).filter(x=>x.backdrop_path).slice(0,10);
  if(!pool.length) return;
  const item = {...pool[Math.floor(Math.random()*pool.length)], _type:type};
  const detail = await api(`/${type}/${item.id}`,`append_to_response=images,videos`);
  const backdrop = detail.backdrop_path ? `${IMG}original${detail.backdrop_path}` : '';
  if(backdrop){
    document.getElementById(`heroBg-${suffix}`).style.backgroundImage=`url(${backdrop})`;
    document.getElementById('globalBg').style.backgroundImage=`url(${backdrop})`;
  }

  const logo = detail.images?.logos?.find(l=>l.iso_639_1==='en' && l.file_path);
  const logoEl = document.getElementById(`heroLogoImg-${suffix}`);
  const titleEl = document.getElementById(`heroTitle-${suffix}`);
  if(logo){ logoEl.src=`${IMG}w300${logo.file_path}`; logoEl.style.display='block'; titleEl.style.display='none'; }
  else { logoEl.style.display='none'; titleEl.style.display='block'; titleEl.textContent=detail.title||detail.name||''; }

  const genres=(detail.genres||[]).slice(0,2).map(g=>g.name).join(' · ');
  const year=(detail.release_date||detail.first_air_date||'').split('-')[0];
  const rating=detail.vote_average?detail.vote_average.toFixed(1):'';
  document.getElementById(`heroRating-${suffix}`).textContent=rating?`★ ${rating}`:'';
  document.getElementById(`heroYear-${suffix}`).textContent=year;
  document.getElementById(`heroGenre-${suffix}`).textContent=genres;
  document.getElementById(`heroDesc-${suffix}`).textContent=detail.overview||'';

  const videos=detail.videos?.results||[];
  const trailerVid=videos.find(v=>v.site==='YouTube'&&v.type==='Trailer')||videos.find(v=>v.site==='YouTube'&&v.type==='Teaser')||videos.find(v=>v.site==='YouTube');
  const trailerKey=trailerVid?.key||null;
  const trailerBtn=document.getElementById(`heroTrailerBtn-${suffix}`);
  if(trailerBtn){ trailerBtn.style.display=trailerKey?'flex':'none'; trailerBtn.onclick=()=>openCinema(trailerKey); }

  document.getElementById(`heroPlayBtn-${suffix}`).onclick=()=>playVidking(item.id,type,detail.title||detail.name);
  document.getElementById(`heroAddBtn-${suffix}`).onclick=()=>toggleList(detail);
  document.getElementById(`heroInfoBtn-${suffix}`).onclick=()=>openDetail(item.id,type);
}

// Titles forced to HD (released on digital/streaming)
const FORCE_HD_TITLES = new Set([
  'ready or not 2',
  'the super mario galaxy movie',
  'super mario galaxy',
  'avatar: the last airbender',
  'avatar aang',
  'avatar aang: the last airbender',
  'the last airbender',
  'the legend of aang',
  'the legend of aang: the last airbender',
  'legend of aang: the last airbender',
  'legend of aang',
  'hail mary',
  'project hail mary',
]);

// Titles forced to COMING SOON with disabled play
const FORCE_COMING_SOON_TITLES = new Set([
  'the devil wears prada 2',
  'devil wears prada 2',
  'the devil wears prada sequel',
]);

function normalizeTitle(t){ return (t||'').toLowerCase().trim(); }

function getQuality(item, type){
  if(type === 'tv') return {label:'HD', cls:'quality-hd'};
  const nt = normalizeTitle(item.title||item.name);
  if(FORCE_COMING_SOON_TITLES.has(nt)) return {label:'COMING SOON', cls:'quality-soon'};
  if(FORCE_HD_TITLES.has(nt)) return {label:'HD', cls:'quality-hd'};
  const today = new Date();
  const releaseDate = item.release_date ? new Date(item.release_date) : null;
  if(!releaseDate || releaseDate > today) return {label:'COMING SOON', cls:'quality-soon'};
  // 90+ days since theatrical = almost certainly on digital/streaming
  if((today - releaseDate) > 90 * 24 * 60 * 60 * 1000) return {label:'HD', cls:'quality-hd'};
  // Recent release — default CAM, async check may upgrade to HD
  return {label:'CAM', cls:'quality-cam'};
}

// Only true streaming-native studios — these release directly to their platform
const STREAMING_COMPANY_IDS = new Set([
  2351,   // Amazon Studios
  7576,   // Amazon MGM Studios
  11073,  // Amazon Studios (alt)
  20580,  // Amazon Prime Video
  34737,  // Netflix
  106380, // Netflix (alt)
  9930,   // Apple TV+
  149123, // Apple Original Films
  76757,  // Disney+ Originals
]);

// After cards are in the DOM, fetch release_dates for all movie cards and upgrade CAM→HD
async function updateMovieQualityBadges(container){
  const badges = Array.from(container.querySelectorAll('.card-quality[data-movie-id]'));
  if(!badges.length) return;
  const today = new Date();
  await Promise.all(badges.map(async badge => {
    // Skip anything already HD or not yet in cinemas
    if(badge.classList.contains('quality-hd') || badge.classList.contains('quality-soon')) return;
    // Skip titles that have been force-overridden
    const cardEl = badge.closest('.card');
    const cardTitle = normalizeTitle(cardEl?.querySelector('img')?.alt || '');
    if(FORCE_HD_TITLES.has(cardTitle) || FORCE_COMING_SOON_TITLES.has(cardTitle)) return;
    const id = badge.dataset.movieId;
    const releaseDate = badge.dataset.releaseDate ? new Date(badge.dataset.releaseDate) : null;
    // Only process movies that have actually had a theatrical release
    if(!releaseDate || isNaN(releaseDate) || releaseDate > today) return;
    try {
      const data = await api(`/movie/${id}`, 'append_to_response=release_dates');
      // Check if produced by a streaming-native studio
      const companies = data.production_companies || [];
      const isStreamingStudio = companies.some(c => STREAMING_COMPANY_IDS.has(c.id));
      if(isStreamingStudio){
        badge.className = 'card-quality quality-hd';
        badge.textContent = 'HD';
        return;
      }
      // Check explicit digital/physical/TV release dates
      const relResults = (data.release_dates?.results) || [];
      for(const country of relResults){
        for(const rd of (country.release_dates||[])){
          if(!rd.release_date) continue;
          const rdDate = new Date(rd.release_date);
          if([4,5,6].includes(rd.type) && !isNaN(rdDate) && rdDate <= today){
            badge.className = 'card-quality quality-hd';
            badge.textContent = 'HD';
            return;
          }
        }
      }
    } catch(e){ /* leave as-is */ }
  }));
}

function buildCard(item, size='card-sm', rank=null){
  const type = item.media_type || item._type || (item.title?'movie':'tv');
  const poster = item.poster_path ? `${IMG}w342${item.poster_path}` : '';
  const bsrc = item.backdrop_path ? `${IMG}w500${item.backdrop_path}` : poster;
  const title = item.title||item.name||'';
  const year = (item.release_date||item.first_air_date||'').split('-')[0];
  const rating = item.vote_average ? item.vote_average.toFixed(1) : '';
  const {label:qlabel, cls:qcls} = getQuality(item, type);
  const isCAM = qcls === 'quality-cam';
  const isSoon = qcls === 'quality-soon';
  const movieAttr = (type==='movie' && item.id && isCAM) ? `data-movie-id="${item.id}" data-release-date="${item.release_date||''}"` : '';
  const d=document.createElement('div');
  d.className=`card ${size}`;
  d.innerHTML=`
    ${rank!=null?`<div class="card-rank">${rank}</div>`:''}
    <img src="${size==='card-md'?bsrc:poster}" alt="${title}" loading="lazy">
    <div class="card-quality ${qcls}" ${movieAttr}>${qlabel}</div>
    <div class="card-overlay">
      ${isSoon
        ? ``
        : `<div class="card-play"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>`}
      <div class="card-hover-title">${title}</div>
      <div class="card-meta">
        ${rating?`<span class="card-meta-rating">★ ${rating}</span>`:''}
        ${rating&&year?`<div class="card-meta-dot"></div>`:''}
        ${year?`<span class="card-meta-year">${year}</span>`:''}
      </div>
    </div>`;
  d.onclick=()=>openDetail(item.id, type);
  return d;
}

function buildRow(title, items, size='card-sm', numbered=false, meta={}){
  const sec=document.createElement('div');
  sec.className='row-block';
  sec.innerHTML=`<div class="row-header"><div class="row-title">${title}</div><div class="row-see-all">See All</div></div>`;
  const wrap=document.createElement('div');
  wrap.className='row-track-wrap';
  const track=document.createElement('div');
  track.className='row-track';
  items.forEach((item,i)=>{
    const card=buildCard(item,size,numbered?i+1:null);
    track.appendChild(card);
  });
  wrap.appendChild(track);
  sec.appendChild(wrap);
  sec.querySelector('.row-see-all').onclick=()=>openSeeAll(title, items, meta);
  return sec;
}

const PLATFORMS = [
  { id:'netflix',   label:'Netflix',    providerId:8,    cls:'pp-netflix'   },
  { id:'prime',     label:'Prime',      providerId:9,    cls:'pp-prime'     },
  { id:'disney',    label:'Disney+',    providerId:337,  cls:'pp-disney'    },
  { id:'apple',     label:'Apple TV+',  providerId:350,  cls:'pp-apple'     },
  { id:'hbo',       label:'Max',        providerId:1899, cls:'pp-hbo'       },
  { id:'paramount', label:'Paramount+', providerId:531,  cls:'pp-paramount' },
];

let _activePlatform = {movie: null, tv: null};

function buildPlatformBar(mediaType){
  const isMobile = window.innerWidth <= 640;
  const wrap = document.createElement('div');
  wrap.className = 'platform-bar';
  wrap.id = `platformBar-${mediaType}`;

  if(isMobile){
    // Mobile: render a styled select dropdown
    wrap.innerHTML = `
      <div class="platform-bar-inner" style="flex-wrap:nowrap;gap:12px;align-items:center">
        <div class="platform-bar-title" style="white-space:nowrap;flex-shrink:0">Browse by <span class="highlight">Platform</span></div>
        <div style="position:relative;flex:1">
          <select class="platform-select" id="platformSelect-${mediaType}" onchange="selectPlatformDropdown(this,'${mediaType}')">
            <option value="">All platforms…</option>
            ${PLATFORMS.map(p=>`<option value="${p.id}" data-provider="${p.providerId}">${p.label}</option>`).join('')}
          </select>
          <svg style="position:absolute;right:14px;top:50%;transform:translateY(-50%);width:16px;height:16px;pointer-events:none;stroke:rgba(255,255,255,0.5)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
        </div>
      </div>`;
  } else {
    // Desktop: render pills
    wrap.innerHTML = `
      <div class="platform-bar-inner">
        <div class="platform-bar-title">Browse by <span class="highlight">Platform</span></div>
        <div class="platform-pills">
          ${PLATFORMS.map(p=>`
            <div class="platform-pill ${p.cls}" data-pid="${p.id}" data-provider="${p.providerId}" onclick="selectPlatform('${p.id}',${p.providerId},'${mediaType}',this)">
              <div class="pp-dot"></div>${p.label}
            </div>`).join('')}
        </div>
      </div>`;
  }

  const results = document.createElement('div');
  results.className = 'platform-results';
  results.id = `platformResults-${mediaType}`;
  wrap._resultsEl = results;
  return wrap;
}

function selectPlatformDropdown(selectEl, mediaType){
  const val = selectEl.value;
  const bar = document.getElementById(`platformBar-${mediaType}`);
  if(!val){
    _activePlatform[mediaType] = null;
    const resultsEl = document.getElementById(`platformResults-${mediaType}`);
    resultsEl.classList.remove('open');
    resultsEl.innerHTML='';
    const allRows = mediaType==='movie' ? document.getElementById('movieRows') : document.getElementById('showRows');
    allRows.querySelectorAll('.row-block').forEach(r=>r.style.display='');
    return;
  }
  const opt = selectEl.querySelector(`option[value="${val}"]`);
  const providerId = parseInt(opt.dataset.provider);
  const pill = bar.querySelector(`.platform-pill[data-pid="${val}"]`);
  selectPlatform(val, providerId, mediaType, pill || selectEl);
}

async function selectPlatform(id, providerId, mediaType, el){
  const bar = document.getElementById(`platformBar-${mediaType}`);
  const resultsEl = document.getElementById(`platformResults-${mediaType}`);
  const allRows = mediaType==='movie'
    ? document.getElementById('movieRows')
    : document.getElementById('showRows');

  // Toggle off
  if(_activePlatform[mediaType] === id){
    _activePlatform[mediaType] = null;
    bar.querySelectorAll('.platform-pill').forEach(p=>p.classList.remove('active'));
    const sel=document.getElementById(`platformSelect-${mediaType}`);if(sel)sel.value='';
    resultsEl.classList.remove('open');
    resultsEl.innerHTML='';
    allRows.querySelectorAll('.row-block').forEach(r=>r.style.display='');
    return;
  }

  _activePlatform[mediaType] = id;
  bar.querySelectorAll('.platform-pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');

  // Hide normal rows, show platform results
  allRows.querySelectorAll('.row-block').forEach(r=>r.style.display='none');
  resultsEl.classList.add('open');
  resultsEl.innerHTML='<div class="spinner"></div>';

  const platform = PLATFORMS.find(p=>p.id===id);
  const base = `with_watch_providers=${providerId}&watch_region=US&sort_by=popularity.desc`;

  const genreRows = mediaType==='movie'
    ? [
        ['Popular on '+platform.label, '', ''],
        ['Action & Adventure', '28', ''],
        ['Comedy', '35', ''],
        ['Drama', '18', ''],
        ['Thriller', '53', ''],
        ['Sci-Fi', '878', ''],
        ['Horror', '27', ''],
      ]
    : [
        ['Popular on '+platform.label, '', ''],
        ['Drama', '18', ''],
        ['Crime & Thriller', '80', ''],
        ['Comedy', '35', ''],
        ['Sci-Fi & Fantasy', '10765', ''],
        ['Action & Adventure', '10759', ''],
        ['Documentary', '99', ''],
      ];

  const fetches = genreRows.map(([,genre])=>
    api(`/discover/${mediaType}`, base + (genre ? `&with_genres=${genre}` : ''))
  );
  const results = await Promise.all(fetches);

  resultsEl.innerHTML='';
  genreRows.forEach(([title], i)=>{
    const items = (results[i].results||[]).map(x=>({...x,_type:mediaType}));
    if(!items.length) return;
    resultsEl.appendChild(buildRow(title, items, 'card-sm', false));
  });
  if(mediaType==='movie') updateMovieQualityBadges(resultsEl);
}

async function openSeeAll(title, items, meta={}){
  const page = document.getElementById('seeallPage');
  document.getElementById('seeallTitle').textContent = title;
  const grid = document.getElementById('seeallGrid');
  grid.innerHTML = '<div class="spinner"></div>';
  page.classList.add('open');
  document.body.style.overflow = 'hidden';
  page.scrollTop = 0;

  // Reset hero
  const heroBg = document.getElementById('seeallHeroBg');
  heroBg.style.backgroundImage = '';
  document.getElementById('seeallHeroLogo').style.display = 'none';
  document.getElementById('seeallHeroTitle').textContent = '';
  document.getElementById('seeallHeroRating').textContent = '';
  document.getElementById('seeallHeroYear').textContent = '';
  document.getElementById('seeallHeroGenre').textContent = '';
  document.getElementById('seeallHeroDesc').textContent = '';
  document.getElementById('seeallTrailerBtn').style.display = 'none';

  // Fetch more items if we have an endpoint
  let allItems = [...items];
  if(meta.endpoint){
    try {
      const [p1, p2] = await Promise.all([
        api(meta.endpoint, (meta.params||'')+'&page=1'),
        api(meta.endpoint, (meta.params||'')+'&page=2'),
      ]);
      const extra = [...(p1.results||[]), ...(p2.results||[])];
      // Merge: keep order, dedupe by id
      const seen = new Set(allItems.map(x=>x.id));
      extra.forEach(x=>{ if(!seen.has(x.id)){ seen.add(x.id); allItems.push(x); }});
    } catch(e){}
  }

  // Tag type on all items
  const type = meta.type || 'movie';
  allItems = allItems.map(x=>({...x, _type: x._type || x.media_type || type}));

  // Pick hero from first item with a backdrop
  const heroItem = allItems.find(x=>x.backdrop_path) || allItems[0];
  if(heroItem){
    (async()=>{
      try{
        const detail = await api(`/${heroItem._type||type}/${heroItem.id}`, 'append_to_response=images,videos');
        const backdrop = detail.backdrop_path ? `${IMG}original${detail.backdrop_path}` : '';
        if(backdrop) heroBg.style.backgroundImage = `url(${backdrop})`;

        const logo = detail.images?.logos?.find(l=>l.iso_639_1==='en' && l.file_path);
        const logoEl = document.getElementById('seeallHeroLogo');
        const titleEl = document.getElementById('seeallHeroTitle');
        if(logo){ logoEl.src=`${IMG}w300${logo.file_path}`; logoEl.style.display='block'; titleEl.style.display='none'; }
        else { logoEl.style.display='none'; titleEl.style.display='block'; titleEl.textContent=detail.title||detail.name||''; }

        const genres=(detail.genres||[]).slice(0,2).map(g=>g.name).join(' · ');
        const year=(detail.release_date||detail.first_air_date||'').split('-')[0];
        const rating=detail.vote_average?detail.vote_average.toFixed(1):'';
        document.getElementById('seeallHeroRating').textContent=rating?`★ ${rating}`:'';
        document.getElementById('seeallHeroYear').textContent=year;
        document.getElementById('seeallHeroGenre').textContent=genres;
        document.getElementById('seeallHeroDesc').textContent=detail.overview||'';

        const videos=detail.videos?.results||[];
        const trailer=videos.find(v=>v.site==='YouTube'&&v.type==='Trailer')||videos.find(v=>v.site==='YouTube');
        const trailerBtn=document.getElementById('seeallTrailerBtn');
        if(trailer){ trailerBtn.style.display='flex'; trailerBtn.onclick=()=>openCinema(trailer.key); }

        document.getElementById('seeallPlayBtn').onclick=()=>playVidking(heroItem.id,heroItem._type||type,detail.title||detail.name);
      }catch(e){}
    })();
  }

  // Render cards with staggered animation
  grid.innerHTML = '';
  allItems.forEach((item, i) => {
    const card = buildCard(item, 'card-sm');
    card.style.width = '100%';
    card.style.height = 'auto';
    card.style.aspectRatio = '2/3';
    card.style.animationDelay = `${Math.min(i * 40, 600)}ms`;
    grid.appendChild(card);
  });
  updateMovieQualityBadges(grid);
}

// ── MOBILE TOUCH SCROLL FIX ──
// Fixes horizontal row scrolling and detail page vertical scroll on mobile
(function(){
  // 1. Row tracks: allow horizontal swipe without triggering vertical page scroll
  function attachRowTouchFix(track){
    var startX, startY, startScrollLeft;
    track.addEventListener('touchstart', function(e){
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      startScrollLeft = track.scrollLeft;
    }, {passive:true});
    track.addEventListener('touchmove', function(e){
      var dx = e.touches[0].clientX - startX;
      var dy = e.touches[0].clientY - startY;
      // If more horizontal than vertical, take control
      if(Math.abs(dx) > Math.abs(dy)){
        e.stopPropagation();
        track.scrollLeft = startScrollLeft - dx;
      }
    }, {passive:true});
  }

  // Attach to any existing tracks and observe for dynamically added ones
  function fixAllTracks(){
    document.querySelectorAll('.row-track').forEach(function(t){
      if(!t._touchFixed){
        t._touchFixed = true;
        attachRowTouchFix(t);
      }
    });
  }
  fixAllTracks();
  var obs = new MutationObserver(fixAllTracks);
  obs.observe(document.body, {childList:true, subtree:true});

  // 2. Detail page: ensure scroll works in both directions
  var detail = document.getElementById('detailPage');
  if(detail){
    var lastY;
    detail.addEventListener('touchstart', function(e){
      lastY = e.touches[0].clientY;
    }, {passive:true});
    detail.addEventListener('touchmove', function(e){
      var y = e.touches[0].clientY;
      var dy = lastY - y;
      lastY = y;
      // Prevent scroll passing through to body
      var atTop = detail.scrollTop <= 0;
      var atBottom = detail.scrollTop + detail.clientHeight >= detail.scrollHeight - 1;
      if((atTop && dy < 0) || (atBottom && dy > 0)){
        e.preventDefault();
      }
    }, {passive:false});
  }
})();
</script>

<script>
(function(){
  var TV_WIDTH=1280,TV_HEIGHT=720;
  function isLargeScreen(){
    var w=window.screen?window.screen.width:window.innerWidth;
    var h=window.screen?window.screen.height:window.innerHeight;
    return w>=TV_WIDTH&&h>=TV_HEIGHT&&(window.devicePixelRatio||1)<=1.5;
  }
  function applyTV(on){
    document.documentElement.classList.toggle('tv-mode',on);
    var btn=document.getElementById('tv-toggle');
    if(btn)btn.classList.toggle('active',on);
  }
  function init(){
    var s=localStorage.getItem('sv_tv_mode');
    if(s==='1')applyTV(true);
    else if(s==='0')applyTV(false);
    else applyTV(isLargeScreen());
  }
  init();
  var t;
  window.addEventListener('resize',function(){
    clearTimeout(t);
    t=setTimeout(function(){
      var s=localStorage.getItem('sv_tv_mode');
      if(s!=='1'&&s!=='0')applyTV(isLargeScreen());
    },200);
  });
  window.toggleTV=function(){
    var on=!document.documentElement.classList.contains('tv-mode');
    applyTV(on);localStorage.setItem('sv_tv_mode',on?'1':'0');
  };
  window.resetTVMode=function(){
    localStorage.removeItem('sv_tv_mode');applyTV(isLargeScreen());
  };
})();
</script>
